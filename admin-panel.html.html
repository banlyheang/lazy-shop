<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L@ZY SHOP - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .stat-label { color: #94a3b8; margin-top: 8px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn:hover, .tab-btn.active { background: linear-gradient(135deg, #6366f1, #ec4899); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center; }
        .product-card .product-image { font-size: 3rem; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        input, select, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        .orders-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content { background: #1e293b; border-radius: 28px; padding: 32px; max-width: 500px; width: 90%; }
        .close { float: right; font-size: 1.5rem; cursor: pointer; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            padding: 15px 25px;
            border-radius: 50px;
            animation: slideIn 0.3s;
            z-index: 2000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><h1>🔐 Admin Dashboard</h1><p style="color:#f59e0b;">Manage Products & Orders</p></div>
            <div><a href="index.html" style="background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:40px; color:white; text-decoration:none;">← Back to Shop</a></div>
        </div>

        <div id="loginCard" style="max-width:400px; margin:50px auto; background:rgba(255,255,255,0.05); border-radius:28px; padding:32px; text-align:center;">
            <h2>🔐 Admin Login</h2>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button class="btn btn-primary" onclick="adminLogin()" style="width:100%;">Login</button>
            <div id="loginError" style="color:#ef4444; margin-top:15px;"></div>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalRevenue">$0</div><div class="stat-label">Revenue</div></div>
                <div class="stat-card"><div class="stat-value" id="totalOrders">0</div><div class="stat-label">Orders</div></div>
                <div class="stat-card"><div class="stat-value" id="totalProducts">0</div><div class="stat-label">Products</div></div>
                <div class="stat-card"><div class="stat-value" id="totalCustomers">0</div><div class="stat-label">Customers</div></div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="showSection('products')">📦 Products</button>
                <button class="tab-btn" onclick="showSection('orders')">📋 Orders</button>
            </div>
            <div id="productsSection" class="tab-content active">
                <button class="btn btn-success" onclick="openProductModal()">➕ Add Product</button>
                <div class="products-grid" id="productsGrid"></div>
            </div>
            <div id="ordersSection" class="tab-content">
                <input type="text" id="orderSearch" placeholder="🔍 Search orders..." onkeyup="filterOrders()" style="margin-bottom:15px;">
                <div class="orders-table"><table style="width:100%"><thead><tr><th>Order #</th><th>Customer</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody id="ordersBody"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal"><div class="modal-content"><span class="close" onclick="closeProductModal()">&times;</span><h2 id="modalTitle">Add Product</h2><input type="hidden" id="productId"><label>Name</label><input type="text" id="productName"><label>Price ($)</label><input type="number" id="productPrice" step="0.01"><label>Stock</label><input type="number" id="productStock" placeholder="-1 unlimited"><label>Image Emoji</label><input type="text" id="productImage" placeholder="👕"><label>Description</label><textarea id="productDesc" rows="2"></textarea><button class="btn btn-success" onclick="saveProduct()">Save</button><button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteProduct()">Delete</button></div></div>
    <div id="orderModal" class="modal"><div class="modal-content"><span class="close" onclick="closeOrderModal()">&times;</span><h2>Update Order</h2><div id="orderInfo"></div><select id="orderStatus"><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select><textarea id="orderMessage" rows="2" placeholder="Update message..."></textarea><button class="btn btn-primary" onclick="updateOrder()">Update</button></div></div>

    <script>
        // ==================== TELEGRAM ALERT CONFIGURATION ====================
        // 🔴 YOUR CORRECT CLOUDFLARE WORKER URL - FIXED!
        const TELEGRAM_WORKER = 'https://telegram-alert.banlyheang849.workers.dev';
        
        async function sendTelegramAlert(message) {
            try {
                const response = await fetch(TELEGRAM_WORKER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                if (response.ok) {
                    console.log('✅ Telegram alert sent!');
                    showToast('📱 Telegram alert sent to Owner!', 'success');
                    return true;
                }
            } catch (e) {
                console.log('❌ Telegram alert failed:', e);
            }
            return false;
        }

        async function generateReceiptWithAlert(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) { showToast('Order not found!', 'error'); return; }
            
            const receiptHtml = `<div style="text-align:center;"><div style="font-size:2rem;">🛍️</div><h2>L@ZY SHOP</h2><p>Receipt</p><hr><p><strong>Order:</strong> ${order.order_number}</p><p><strong>Customer:</strong> ${order.customer_name}</p><p><strong>Amount:</strong> $${order.total_amount}</p><p><strong>Status:</strong> ${order.order_status}</p><hr><p>Thank you!</p></div>`;
            const win = window.open();
            win.document.write(`<html><head><title>Receipt_${order.order_number}</title><style>body{font-family:Arial;padding:40px;}</style></head><body>${receiptHtml}<script>window.print();<\/script></body></html>`);
            win.document.close();
            
            // 🔔 SEND TELEGRAM ALERT
            await sendTelegramAlert(
                `🧾 **RECEIPT GENERATED**\n\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `📄 Order: ${order.order_number}\n` +
                `👤 Customer: ${order.customer_name}\n` +
                `📞 Phone: ${order.customer_phone || 'N/A'}\n` +
                `💰 Amount: $${order.total_amount}\n` +
                `📅 Time: ${new Date().toLocaleString()}\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `🔔 Generated by: ${currentAdmin?.name || 'Admin'}\n` +
                `✅ Receipt downloaded successfully!`
            );
            
            showToast('✅ Receipt generated! Telegram alert sent to Owner.');
        }

        // ==================== DATA ====================
        let products = [
            { id: 1, name: "Premium T-Shirt", price: 25.99, stock: 50, sales: 45, image: "👕" },
            { id: 2, name: "Wireless Headphones", price: 49.99, stock: 30, sales: 38, image: "🎧" },
            { id: 3, name: "Smart Watch", price: 89.99, stock: 20, sales: 25, image: "⌚" },
            { id: 4, name: "Leather Backpack", price: 39.99, stock: 40, sales: 32, image: "🎒" },
            { id: 5, name: "Sunglasses", price: 19.99, stock: 60, sales: 55, image: "🕶️" }
        ];
        let orders = [], users = [];
        let adminAccounts = [
            { username: "admin1", password: "admin123", name: "Admin" },
            { username: "lixing", password: "lixing26", name: "Lixing" }
        ];
        let currentAdmin = null;
        let currentOrder = null;

        function init() { loadData(); renderStats(); renderProducts(); renderOrders(); }
        function loadData() { let p=localStorage.getItem('lazy_products'); if(p) products=JSON.parse(p); let o=localStorage.getItem('lazy_orders'); if(o) orders=JSON.parse(o); let u=localStorage.getItem('lazy_users'); if(u) users=JSON.parse(u); }
        function saveAll() { localStorage.setItem('lazy_products',JSON.stringify(products)); localStorage.setItem('lazy_orders',JSON.stringify(orders)); localStorage.setItem('lazy_users',JSON.stringify(users)); }

        function adminLogin() { let u=document.getElementById('adminUsername').value; let p=document.getElementById('adminPassword').value; let a=adminAccounts.find(a=>a.username===u&&a.password===p); if(a){ currentAdmin=a; document.getElementById('loginCard').style.display='none'; document.getElementById('adminPanel').style.display='block'; renderStats(); renderProducts(); renderOrders(); showToast(`Welcome ${a.name}!`); } else { document.getElementById('loginError').innerHTML='Invalid credentials!'; } }
        function renderStats() { let revenue=orders.filter(o=>o.payment_status==='paid').reduce((s,o)=>s+o.total_amount,0); document.getElementById('totalRevenue').innerHTML=`$${revenue.toFixed(2)}`; document.getElementById('totalOrders').innerHTML=orders.length; document.getElementById('totalProducts').innerHTML=products.length; document.getElementById('totalCustomers').innerHTML=users.length; }
        function showSection(s) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(`${s}Section`).classList.add('active'); event.target.classList.add('active'); if(s==='products') renderProducts(); if(s==='orders') renderOrders(); }

        function renderProducts() { document.getElementById('productsGrid').innerHTML=products.map(p=>`<div class="product-card"><div class="product-image">${p.image}</div><h3>${p.name}</h3><div>$${p.price}</div><div>📦 Stock: ${p.stock===-1?'Unlimited':p.stock}</div><div>📈 Sold: ${p.sales||0}</div><button class="btn btn-warning" onclick="editProduct(${p.id})">Edit</button><button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button></div>`).join(''); }
        function openProductModal(p=null){ document.getElementById('modalTitle').innerHTML=p?'Edit Product':'Add Product'; document.getElementById('productId').value=p?.id||''; document.getElementById('productName').value=p?.name||''; document.getElementById('productPrice').value=p?.price||''; document.getElementById('productStock').value=p?.stock||''; document.getElementById('productImage').value=p?.image||'🛍️'; document.getElementById('productDesc').value=p?.description||''; document.getElementById('deleteBtn').style.display=p?'inline-block':'none'; document.getElementById('productModal').style.display='flex'; }
        function editProduct(id){ let p=products.find(p=>p.id===id); if(p) openProductModal(p); }
        function deleteProduct(){ let id=parseInt(document.getElementById('productId').value); if(confirm('Delete?')){ products=products.filter(p=>p.id!==id); saveAll(); renderProducts(); renderStats(); closeProductModal(); showToast('Deleted'); } }
        function saveProduct(){ let id=parseInt(document.getElementById('productId').value); let name=document.getElementById('productName').value.trim(); let price=parseFloat(document.getElementById('productPrice').value); let stock=parseInt(document.getElementById('productStock').value); let image=document.getElementById('productImage').value.trim()||'🛍️'; let desc=document.getElementById('productDesc').value.trim(); if(!name||isNaN(price)){ showToast('Fill fields!','error'); return; } if(id){ let idx=products.findIndex(p=>p.id===id); if(idx!==-1) products[idx]={...products[idx],name,price,stock,image,description:desc}; showToast('Product updated!'); } else { let newId=Math.max(...products.map(p=>p.id),0)+1; products.push({id:newId,name,price,stock,image,description:desc,sales:0}); showToast('Product added!'); } saveAll(); renderProducts(); renderStats(); closeProductModal(); }
        function closeProductModal(){ document.getElementById('productModal').style.display='none'; }

        function renderOrders(){ let tbody=document.getElementById('ordersBody'); tbody.innerHTML=orders.map(o=>`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>$${o.total_amount}</td><td style="color:${o.order_status==='delivered'?'#10b981':'#f59e0b'}">${o.order_status}</td><td><button class="btn btn-primary" onclick="generateReceiptWithAlert(${o.id})">🧾 Receipt</button><button class="btn btn-warning" onclick="openOrderModal(${o.id})">✏️ Update</button></td></tr>`).join(''); }
        function filterOrders(){ let s=document.getElementById('orderSearch').value.toLowerCase(); let filtered=orders.filter(o=>o.order_number.toLowerCase().includes(s)||o.customer_name.toLowerCase().includes(s)); document.getElementById('ordersBody').innerHTML=filtered.map(o=>`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>$${o.total_amount}</td><td>${o.order_status}</td><td><button class="btn btn-primary" onclick="generateReceiptWithAlert(${o.id})">🧾 Receipt</button><button class="btn btn-warning" onclick="openOrderModal(${o.id})">✏️ Update</button></td></tr>`).join(''); }
        function openOrderModal(id){ currentOrder=orders.find(o=>o.id===id); if(currentOrder){ document.getElementById('orderInfo').innerHTML=`<p><strong>${currentOrder.order_number}</strong><br>${currentOrder.customer_name}</p>`; document.getElementById('orderStatus').value=currentOrder.order_status; document.getElementById('orderModal').style.display='flex'; } }
        function updateOrder(){ if(currentOrder){ currentOrder.order_status=document.getElementById('orderStatus').value; let msg=document.getElementById('orderMessage').value||`Status updated to ${currentOrder.order_status}`; if(!currentOrder.updates) currentOrder.updates=[]; currentOrder.updates.unshift({date:new Date().toISOString(),message:msg}); saveAll(); renderOrders(); renderStats(); closeOrderModal(); showToast('Order updated!'); } }
        function closeOrderModal(){ document.getElementById('orderModal').style.display='none'; }

        function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        init();
    </script>
</body>
</html>
