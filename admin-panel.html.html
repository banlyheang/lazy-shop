<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L@ZY SHOP - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .stat-label { color: #94a3b8; margin-top: 8px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn:hover, .tab-btn.active { background: linear-gradient(135deg, #6366f1, #ec4899); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center; }
        .product-image { width: 120px; height: 120px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        input, select, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        .orders-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content { background: #1e293b; border-radius: 28px; padding: 32px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .close { float: right; font-size: 1.5rem; cursor: pointer; }
        .images-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .image-preview { width: 80px; height: 80px; border-radius: 10px; overflow: hidden; position: relative; background: rgba(255,255,255,0.1); }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: #ef4444; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; border: none; color: white; }
        .upload-area { border: 2px dashed rgba(255,255,255,0.3); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #10b981; padding: 15px 25px; border-radius: 50px; animation: slideIn 0.3s; z-index: 2000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><h1>🔐 Admin Dashboard</h1><p style="color:#f59e0b;">Manage Products, Orders, Users</p></div>
            <div><a href="index.html" style="background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:40px; color:white; text-decoration:none;">← Back to Shop</a></div>
        </div>

        <div id="loginCard" style="max-width:400px; margin:50px auto; background:rgba(255,255,255,0.05); border-radius:28px; padding:32px; text-align:center;">
            <h2>🔐 Admin Login</h2>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button class="btn btn-primary" onclick="adminLogin()" style="width:100%;">Login</button>
            <div id="loginError" style="color:#ef4444; margin-top:15px;"></div>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalRevenue">$0</div><div class="stat-label">Revenue</div></div>
                <div class="stat-card"><div class="stat-value" id="totalOrders">0</div><div class="stat-label">Orders</div></div>
                <div class="stat-card"><div class="stat-value" id="totalProducts">0</div><div class="stat-label">Products</div></div>
                <div class="stat-card"><div class="stat-value" id="totalCustomers">0</div><div class="stat-label">Customers</div></div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="showSection('products')">📦 Products</button>
                <button class="tab-btn" onclick="showSection('orders')">📋 Orders</button>
                <button class="tab-btn" onclick="showSection('users')">👥 Users</button>
                <button class="tab-btn" onclick="showSection('coupons')">🎫 Coupons</button>
            </div>
            <div id="productsSection" class="tab-content active">
                <button class="btn btn-success" onclick="openProductModal()">➕ Add Product</button>
                <div class="products-grid" id="productsGrid"></div>
            </div>
            <div id="ordersSection" class="tab-content">
                <input type="text" id="orderSearch" placeholder="🔍 Search orders..." onkeyup="filterOrders()" style="margin-bottom:15px;">
                <div class="orders-table"><table style="width:100%"><thead><tr><th>Order #</th><th>Customer</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody id="ordersBody"></tbody></table></div>
            </div>
            <div id="usersSection" class="tab-content">
                <div class="orders-table"><table style="width:100%"><thead><tr><th>Email</th><th>Name</th><th>Phone</th><th>Joined</th><th>Actions</th></tr></thead><tbody id="usersBody"></tbody></table></div>
            </div>
            <div id="couponsSection" class="tab-content">
                <div class="card" style="background:rgba(255,255,255,0.05); border-radius:24px; padding:28px;">
                    <h3>🎫 Promo Codes</h3>
                    <div id="couponsList"></div>
                    <div style="margin-top:20px;"><label>New Coupon Code</label><input type="text" id="newCouponCode"><label>Discount Amount</label><input type="number" id="newCouponDiscount"><label>Discount Type</label><select id="newCouponType"><option value="percent">Percent (%)</option><option value="fixed">Fixed ($)</option></select><button class="btn btn-success" onclick="addCoupon()">Add Coupon</button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal"><div class="modal-content"><span class="close" onclick="closeProductModal()">&times;</span><h2 id="modalTitle">Add Product</h2><input type="hidden" id="productId"><label>Name</label><input type="text" id="productName"><label>Price ($)</label><input type="number" id="productPrice" step="0.01"><label>Stock</label><input type="number" id="productStock"><label>Category</label><select id="productCategory"><option value="Electronics">Electronics</option><option value="Clothing">Clothing</option><option value="Accessories">Accessories</option></select><label>Images (Up to 5)</label><div class="images-container" id="imagesContainer"></div><div class="upload-area" onclick="document.getElementById('productImageInput').click()">📤 Click to upload images</div><input type="file" id="productImageInput" accept="image/*" multiple style="display:none;" onchange="handleImageUpload(this)"><label>OR Emoji</label><input type="text" id="productImage" placeholder="👕"><label>Description</label><textarea id="productDesc" rows="2"></textarea><button class="btn btn-success" onclick="saveProduct()">Save</button><button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteProduct()">Delete</button></div></div>
    <div id="orderModal" class="modal"><div class="modal-content"><span class="close" onclick="closeOrderModal()">&times;</span><h2>Update Order</h2><div id="orderInfo"></div><select id="orderStatus"><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option></select><textarea id="orderMessage" rows="2" placeholder="Update message..."></textarea><button class="btn btn-primary" onclick="updateOrder()">Update</button></div></div>

    <script>
        let products = [], orders = [], users = [];
        let adminAccounts = [{ username: "admin1", password: "admin123", name: "Admin" }, { username: "lixing", password: "lixing26", name: "Lixing" }];
        let currentAdmin = null, currentOrder = null;
        let currentProductImages = [];

        function init() { loadData(); renderStats(); renderProducts(); renderOrders(); renderUsers(); renderCoupons(); }
        function loadData() { let p=localStorage.getItem('lazy_products'); if(p) products=JSON.parse(p); let o=localStorage.getItem('lazy_orders'); if(o) orders=JSON.parse(o); let u=localStorage.getItem('lazy_users'); if(u) users=JSON.parse(u); }
        function saveAll() { localStorage.setItem('lazy_products',JSON.stringify(products)); localStorage.setItem('lazy_orders',JSON.stringify(orders)); localStorage.setItem('lazy_users',JSON.stringify(users)); }
        function adminLogin() { let u=document.getElementById('adminUsername').value; let p=document.getElementById('adminPassword').value; let a=adminAccounts.find(a=>a.username===u&&a.password===p); if(a){ currentAdmin=a; document.getElementById('loginCard').style.display='none'; document.getElementById('adminPanel').style.display='block'; renderStats(); renderProducts(); renderOrders(); renderUsers(); renderCoupons(); showToast(`Welcome ${a.name}!`); } else { document.getElementById('loginError').innerHTML='Invalid credentials!'; } }
        function renderStats() { let revenue=orders.filter(o=>o.payment_status==='paid').reduce((s,o)=>s+o.total_amount,0); document.getElementById('totalRevenue').innerHTML=`$${revenue.toFixed(2)}`; document.getElementById('totalOrders').innerHTML=orders.length; document.getElementById('totalProducts').innerHTML=products.length; document.getElementById('totalCustomers').innerHTML=users.length; }
        function showSection(s) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(`${s}Section`).classList.add('active'); event.target.classList.add('active'); if(s==='products') renderProducts(); if(s==='orders') renderOrders(); if(s==='users') renderUsers(); if(s==='coupons') renderCoupons(); }

        function renderProducts() { document.getElementById('productsGrid').innerHTML=products.map(p=>`<div class="product-card"><div class="product-image">${p.images && p.images.length ? `<img src="${p.images[0]}">` : `<div style="font-size:3rem;">${p.image || '🛍️'}</div>`}</div><h3>${p.name}</h3><div>$${p.price}</div><div>📦 Stock: ${p.stock}</div><div>📈 Sold: ${p.sales||0}</div><div>⭐ ${p.rating||0}</div><button class="btn btn-warning" onclick="editProduct(${p.id})">Edit</button><button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button></div>`).join(''); }
        function openProductModal(p=null){ document.getElementById('modalTitle').innerHTML=p?'Edit Product':'Add Product'; document.getElementById('productId').value=p?.id||''; document.getElementById('productName').value=p?.name||''; document.getElementById('productPrice').value=p?.price||''; document.getElementById('productStock').value=p?.stock||''; document.getElementById('productCategory').value=p?.category||'Electronics'; document.getElementById('productImage').value=p?.image||'🛍️'; document.getElementById('productDesc').value=p?.description||''; currentProductImages = p?.images || []; renderImagePreviews(); document.getElementById('deleteBtn').style.display=p?'inline-block':'none'; document.getElementById('productModal').style.display='flex'; }
        function editProduct(id){ let p=products.find(p=>p.id===id); if(p) openProductModal(p); }
        function deleteProduct(){ let id=parseInt(document.getElementById('productId').value); if(confirm('Delete?')){ products=products.filter(p=>p.id!==id); saveAll(); renderProducts(); renderStats(); closeProductModal(); showToast('Deleted'); } }
        function handleImageUpload(input){ for(let file of input.files){ if(currentProductImages.length>=5){ showToast('Max 5 images!','error'); break; } let r=new FileReader(); r.onload=e=>{ currentProductImages.push(e.target.result); renderImagePreviews(); }; r.readAsDataURL(file); } input.value=''; }
        function renderImagePreviews(){ let container=document.getElementById('imagesContainer'); container.innerHTML=currentProductImages.map((img,idx)=>`<div class="image-preview"><img src="${img}"><button class="remove-img-btn" onclick="removeImage(${idx})">✕</button></div>`).join(''); }
        function removeImage(idx){ currentProductImages.splice(idx,1); renderImagePreviews(); }
        function saveProduct(){ let id=parseInt(document.getElementById('productId').value); let name=document.getElementById('productName').value.trim(); let price=parseFloat(document.getElementById('productPrice').value); let stock=parseInt(document.getElementById('productStock').value); let category=document.getElementById('productCategory').value; let image=document.getElementById('productImage').value.trim()||'🛍️'; let desc=document.getElementById('productDesc').value.trim(); if(!name||isNaN(price)){ showToast('Fill fields!','error'); return; } if(id){ let idx=products.findIndex(p=>p.id===id); if(idx!==-1) products[idx]={...products[idx],name,price,stock,category,images:currentProductImages,image:currentProductImages.length?null:image,description:desc}; showToast('Product updated!'); } else { let newId=Math.max(...products.map(p=>p.id),0)+1; products.push({id:newId,name,price,stock,category,images:currentProductImages,image:currentProductImages.length?null:image,sales:0,rating:4.0,description:desc}); showToast('Product added!'); } saveAll(); renderProducts(); renderStats(); closeProductModal(); }
        function closeProductModal(){ document.getElementById('productModal').style.display='none'; currentProductImages=[]; }

        function renderOrders(){ let tbody=document.getElementById('ordersBody'); tbody.innerHTML=orders.map(o=>`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>$${o.total_amount}</td><td style="color:${o.order_status==='delivered'?'#10b981':'#f59e0b'}">${o.order_status}</td><td><button class="btn btn-primary" onclick="openOrderModal(${o.id})">Update</button></td></tr>`).join(''); }
        function filterOrders(){ let s=document.getElementById('orderSearch').value.toLowerCase(); let filtered=orders.filter(o=>o.order_number.toLowerCase().includes(s)||o.customer_name.toLowerCase().includes(s)); document.getElementById('ordersBody').innerHTML=filtered.map(o=>`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>$${o.total_amount}</td><td>${o.order_status}</td><td><button class="btn btn-primary" onclick="openOrderModal(${o.id})">Update</button></td></tr>`).join(''); }
        function openOrderModal(id){ currentOrder=orders.find(o=>o.id===id); if(currentOrder){ document.getElementById('orderInfo').innerHTML=`<p><strong>${currentOrder.order_number}</strong><br>${currentOrder.customer_name}</p>`; document.getElementById('orderStatus').value=currentOrder.order_status; document.getElementById('orderModal').style.display='flex'; } }
        function updateOrder(){ if(currentOrder){ currentOrder.order_status=document.getElementById('orderStatus').value; let msg=document.getElementById('orderMessage').value||`Status updated to ${currentOrder.order_status}`; if(!currentOrder.updates) currentOrder.updates=[]; currentOrder.updates.unshift({date:new Date().toISOString(),message:msg}); saveAll(); renderOrders(); renderStats(); closeOrderModal(); showToast('Order updated!'); } }
        function closeOrderModal(){ document.getElementById('orderModal').style.display='none'; }

        function renderUsers(){ let tbody=document.getElementById('usersBody'); tbody.innerHTML=users.map(u=>`<tr><td>${u.email || 'N/A'}</td><td>${u.name || 'N/A'}</td><td>${u.phone || 'N/A'}</td><td>${new Date(u.joined).toLocaleDateString()}</td><td><button class="btn btn-danger" onclick="deleteUser('${u.email}')">Delete</button></td></tr>`).join(''); }
        function deleteUser(email){ if(confirm('Delete user?')){ users=users.filter(u=>u.email!==email); saveAll(); renderUsers(); renderStats(); showToast('User deleted'); } }

        function renderCoupons(){ let coupons=JSON.parse(localStorage.getItem('lazy_coupons')||'[]'); document.getElementById('couponsList').innerHTML=coupons.map(c=>`<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;"><div><strong>${c.code}</strong><br>${c.discount}${c.type==='percent'?'%':'$'} off</div><button class="btn btn-danger" onclick="deleteCoupon('${c.code}')">Delete</button></div>`).join('')||'<p>No coupons yet</p>'; }
        function addCoupon(){ let code=document.getElementById('newCouponCode').value.toUpperCase(); let discount=parseFloat(document.getElementById('newCouponDiscount').value); let type=document.getElementById('newCouponType').value; if(!code||isNaN(discount)){ showToast('Enter code and discount!','error'); return; } let coupons=JSON.parse(localStorage.getItem('lazy_coupons')||'[]'); coupons.push({code,discount,type}); localStorage.setItem('lazy_coupons',JSON.stringify(coupons)); renderCoupons(); showToast('Coupon added!'); document.getElementById('newCouponCode').value=''; document.getElementById('newCouponDiscount').value=''; }
        function deleteCoupon(code){ let coupons=JSON.parse(localStorage.getItem('lazy_coupons')||'[]'); coupons=coupons.filter(c=>c.code!==code); localStorage.setItem('lazy_coupons',JSON.stringify(coupons)); renderCoupons(); showToast('Coupon deleted'); }

        function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        init();
    </script>
</body>
</html>
