<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - L@ZY SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .store-logo {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .admin-badge {
            background: #f59e0b;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .back-link {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: 800; color: #6366f1; }
        .stat-label { color: #94a3b8; margin-top: 8px; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #ec4899);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .product-card .product-image { font-size: 3rem; }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn:hover { transform: translateY(-2px); }
        
        /* Forms */
        input, select, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 14px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        
        /* Table */
        .orders-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #6366f1; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 28px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        .close { float: right; font-size: 1.5rem; cursor: pointer; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            padding: 15px 25px;
            border-radius: 50px;
            animation: slideIn 0.3s;
            z-index: 2000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="store-logo">🔐</div>
                <div><h1>Admin Dashboard</h1><p><span class="admin-badge">Administrator Access</span></p></div>
            </div>
            <div><a href="index.html" class="back-link">← Back to Shop</a></div>
        </div>

        <!-- Login Section -->
        <div id="loginCard" class="card" style="max-width:400px; margin:50px auto; background:rgba(255,255,255,0.05); border-radius:28px; padding:32px; text-align:center;">
            <h2 style="margin-bottom:20px;">🔐 Admin Login</h2>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button class="btn btn-primary" onclick="adminLogin()" style="width:100%;">Login</button>
            <div id="loginError" style="color:#ef4444; margin-top:15px;"></div>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" style="display:none;">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalRevenue">$0</div><div class="stat-label">Total Revenue</div></div>
                <div class="stat-card"><div class="stat-value" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
                <div class="stat-card"><div class="stat-value" id="totalProducts">0</div><div class="stat-label">Products</div></div>
                <div class="stat-card"><div class="stat-value" id="totalCustomers">0</div><div class="stat-label">Customers</div></div>
            </div>

            <!-- Navigation -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showSection('products')">📦 Products</button>
                <button class="tab-btn" onclick="showSection('orders')">📋 Orders</button>
                <button class="tab-btn" onclick="showSection('settings')">⚙️ Settings</button>
                <button class="tab-btn" onclick="showSection('qr')">💳 QR Payment</button>
            </div>

            <!-- Products Section -->
            <div id="productsSection" class="tab-content active">
                <button class="btn btn-success" onclick="openProductModal()">➕ Add New Product</button>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <!-- Orders Section -->
            <div id="ordersSection" class="tab-content">
                <input type="text" id="orderSearch" placeholder="🔍 Search orders..." onkeyup="filterOrders()" style="margin-bottom:15px;">
                <div class="orders-table">
                    <table>
                        <thead><tr><th>Order #</th><th>Customer</th><th>Phone</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Settings Section -->
            <div id="settingsSection" class="tab-content">
                <div class="card" style="background:rgba(255,255,255,0.05); border-radius:24px; padding:28px;">
                    <h3>🏪 Store Settings</h3>
                    <label>Store Name</label><input type="text" id="storeNameInput">
                    <label>Store Slogan</label><input type="text" id="storeSloganInput">
                    <label>Contact Phone</label><input type="text" id="storePhoneInput">
                    <label>Contact Email</label><input type="email" id="storeEmailInput">
                    <label>Address</label><textarea id="storeAddressInput" rows="2"></textarea>
                    <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
                </div>
            </div>

            <!-- QR Section -->
            <div id="qrSection" class="tab-content">
                <div class="card" style="background:rgba(255,255,255,0.05); border-radius:24px; padding:28px;">
                    <h3>💳 Payment QR Code</h3>
                    <div style="text-align:center; margin-bottom:20px;"><img id="qrPreview" src="" style="display:none; width:150px; height:150px;"><div id="qrPlaceholder" style="font-size:60px;">💳</div></div>
                    <div class="upload-area" onclick="document.getElementById('qrFile').click()" style="border:2px dashed rgba(255,255,255,0.3); border-radius:20px; padding:30px; text-align:center; cursor:pointer;">📤 Click to Upload QR Code</div>
                    <input type="file" id="qrFile" accept="image/*" style="display:none;" onchange="previewQR(this)">
                    <label>QR Image URL</label><input type="text" id="qrUrl" placeholder="https://example.com/qr.png">
                    <label>Bank Name</label><input type="text" id="qrBankName" placeholder="ABA Bank">
                    <label>Account Number</label><input type="text" id="qrAccountNumber" placeholder="001059172">
                    <label>Account Name</label><input type="text" id="qrAccountName" placeholder="Ban Lyheang">
                    <button class="btn btn-primary" onclick="saveQR()">💾 Save QR Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <h2 id="modalTitle">Add Product</h2>
            <input type="hidden" id="productId">
            <label>Product Name</label><input type="text" id="productName">
            <label>Price ($)</label><input type="number" id="productPrice" step="0.01">
            <label>Stock Quantity</label><input type="number" id="productStock" placeholder="-1 for unlimited">
            <label>Product Emoji</label><input type="text" id="productImage" placeholder="👕">
            <label>Description</label><textarea id="productDesc" rows="2"></textarea>
            <button class="btn btn-success" onclick="saveProduct()">Save</button>
            <button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteProduct()">Delete</button>
        </div>
    </div>

    <!-- Update Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeOrderModal()">&times;</span>
            <h2>Update Order Status</h2>
            <div id="orderInfo"></div>
            <select id="orderStatus"><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option></select>
            <textarea id="orderMessage" rows="2" placeholder="Update message..."></textarea>
            <button class="btn btn-primary" onclick="updateOrderStatus()">Update</button>
        </div>
    </div>

    <script>
        let products = [], orders = [], users = [], currentOrder = null;
        let adminAccounts = [
            { username: "admin1", password: "admin123", name: "Admin" },
            { username: "lixing", password: "lixing26", name: "Lixing" }
        ];
        let isLoggedIn = false;
        let qrSettings = { qrImage: "", bankName: "ABA Bank", accountNumber: "001059172", accountName: "Ban Lyheang" };

        function init() {
            loadData();
            renderStats();
            renderProducts();
            renderOrders();
            loadSettings();
            loadQR();
        }

        function loadData() {
            let p = localStorage.getItem('lazy_products'); if(p) products = JSON.parse(p);
            let o = localStorage.getItem('lazy_orders'); if(o) orders = JSON.parse(o);
            let u = localStorage.getItem('lazy_users'); if(u) users = JSON.parse(u);
            let q = localStorage.getItem('qr_settings'); if(q) qrSettings = JSON.parse(q);
        }

        function saveAll() {
            localStorage.setItem('lazy_products', JSON.stringify(products));
            localStorage.setItem('lazy_orders', JSON.stringify(orders));
            localStorage.setItem('lazy_users', JSON.stringify(users));
            localStorage.setItem('qr_settings', JSON.stringify(qrSettings));
        }

        function adminLogin() {
            let username = document.getElementById('adminUsername').value;
            let password = document.getElementById('adminPassword').value;
            let admin = adminAccounts.find(a => a.username === username && a.password === password);
            if(admin) {
                isLoggedIn = true;
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderStats();
                renderProducts();
                renderOrders();
                showToast(`Welcome ${admin.name}!`);
            } else {
                document.getElementById('loginError').innerHTML = 'Invalid credentials!';
            }
        }

        function showSection(section) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${section}Section`).classList.add('active');
            event.target.classList.add('active');
        }

        function renderStats() {
            let revenue = orders.filter(o => o.payment_status === 'paid').reduce((s,o) => s + o.total_amount, 0);
            document.getElementById('totalRevenue').innerHTML = `$${revenue.toFixed(2)}`;
            document.getElementById('totalOrders').innerHTML = orders.length;
            document.getElementById('totalProducts').innerHTML = products.length;
            document.getElementById('totalCustomers').innerHTML = users.length;
        }

        function renderProducts() {
            let grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-image">${p.image}</div>
                    <h3>${p.name}</h3>
                    <div>$${p.price}</div>
                    <div>📦 Stock: ${p.stock}</div>
                    <div>📈 Sold: ${p.sales || 0}</div>
                    <button class="btn btn-warning" onclick="editProduct(${p.id})">✏️ Edit</button>
                    <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                </div>
            `).join('');
        }

        function openProductModal(p = null) {
            document.getElementById('modalTitle').innerHTML = p ? 'Edit Product' : 'Add Product';
            document.getElementById('productId').value = p?.id || '';
            document.getElementById('productName').value = p?.name || '';
            document.getElementById('productPrice').value = p?.price || '';
            document.getElementById('productStock').value = p?.stock || '';
            document.getElementById('productImage').value = p?.image || '🛍️';
            document.getElementById('productDesc').value = p?.description || '';
            document.getElementById('deleteBtn').style.display = p ? 'inline-block' : 'none';
            document.getElementById('productModal').style.display = 'flex';
        }

        function editProduct(id) {
            let p = products.find(p => p.id === id);
            if(p) openProductModal(p);
        }

        function saveProduct() {
            let id = parseInt(document.getElementById('productId').value);
            let name = document.getElementById('productName').value.trim();
            let price = parseFloat(document.getElementById('productPrice').value);
            let stock = parseInt(document.getElementById('productStock').value);
            let image = document.getElementById('productImage').value.trim() || '🛍️';
            let description = document.getElementById('productDesc').value.trim();
            if(!name || isNaN(price)) { alert('Fill all fields'); return; }
            if(id) {
                let idx = products.findIndex(p => p.id === id);
                if(idx !== -1) products[idx] = {...products[idx], name, price, stock, image, description};
                showToast('Product updated!');
            } else {
                let newId = Math.max(...products.map(p => p.id), 0) + 1;
                products.push({id: newId, name, price, stock, image, description, sales: 0});
                showToast('Product added!');
            }
            saveAll();
            renderProducts();
            renderStats();
            closeProductModal();
        }

        function deleteProduct() {
            let id = parseInt(document.getElementById('productId').value);
            if(confirm('Delete this product?')) {
                products = products.filter(p => p.id !== id);
                saveAll();
                renderProducts();
                renderStats();
                closeProductModal();
                showToast('Product deleted');
            }
        }

        function closeProductModal() { document.getElementById('productModal').style.display = 'none'; }

        function renderOrders() {
            let tbody = document.getElementById('ordersBody');
            tbody.innerHTML = orders.map(o => `
                <tr>
                    <td>${o.order_number}</td><td>${o.customer_name}</td><td>${o.customer_phone}</td>
                    <td>$${o.total_amount}</td><td style="color:${o.payment_status==='paid'?'#10b981':'#f59e0b'}">${o.order_status}</td>
                    <td><button class="btn btn-primary" onclick="openOrderModal(${o.id})">✏️ Update</button></td>
                </tr>
            `).join('');
        }

        function filterOrders() {
            let search = document.getElementById('orderSearch').value.toLowerCase();
            let filtered = orders.filter(o => o.order_number.toLowerCase().includes(search) || o.customer_name.toLowerCase().includes(search));
            document.getElementById('ordersBody').innerHTML = filtered.map(o => `
                <tr>
                    <td>${o.order_number}</td><td>${o.customer_name}</td><td>${o.customer_phone}</td>
                    <td>$${o.total_amount}</td><td>${o.order_status}</td>
                    <td><button class="btn btn-primary" onclick="openOrderModal(${o.id})">✏️ Update</button></td>
                </tr>
            `).join('');
        }

        function openOrderModal(id) {
            currentOrder = orders.find(o => o.id === id);
            if(currentOrder) {
                document.getElementById('orderInfo').innerHTML = `<p><strong>${currentOrder.order_number}</strong><br>${currentOrder.customer_name}</p>`;
                document.getElementById('orderStatus').value = currentOrder.order_status;
                document.getElementById('orderModal').style.display = 'flex';
            }
        }

        function updateOrderStatus() {
            if(currentOrder) {
                currentOrder.order_status = document.getElementById('orderStatus').value;
                let msg = document.getElementById('orderMessage').value || `Status updated to ${currentOrder.order_status}`;
                if(!currentOrder.updates) currentOrder.updates = [];
                currentOrder.updates.unshift({date: new Date().toISOString(), message: msg});
                saveAll();
                renderOrders();
                renderStats();
                closeOrderModal();
                showToast('Order updated!');
            }
        }

        function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

        function loadSettings() {
            document.getElementById('storeNameInput').value = localStorage.getItem('store_name') || 'L@ZY SHOP';
            document.getElementById('storeSloganInput').value = localStorage.getItem('store_slogan') || '✨ Premium Quality';
            document.getElementById('storePhoneInput').value = localStorage.getItem('store_phone') || '0969903084';
            document.getElementById('storeEmailInput').value = localStorage.getItem('store_email') || 'lazy@shop.com';
            document.getElementById('storeAddressInput').value = localStorage.getItem('store_address') || 'Phnom Penh, Cambodia';
        }

        function saveSettings() {
            localStorage.setItem('store_name', document.getElementById('storeNameInput').value);
            localStorage.setItem('store_slogan', document.getElementById('storeSloganInput').value);
            localStorage.setItem('store_phone', document.getElementById('storePhoneInput').value);
            localStorage.setItem('store_email', document.getElementById('storeEmailInput').value);
            localStorage.setItem('store_address', document.getElementById('storeAddressInput').value);
            showToast('Settings saved!');
        }

        function loadQR() {
            if(qrSettings.qrImage) {
                document.getElementById('qrPreview').src = qrSettings.qrImage;
                document.getElementById('qrPreview').style.display = 'block';
                document.getElementById('qrPlaceholder').style.display = 'none';
            }
            document.getElementById('qrBankName').value = qrSettings.bankName;
            document.getElementById('qrAccountNumber').value = qrSettings.accountNumber;
            document.getElementById('qrAccountName').value = qrSettings.accountName;
        }

        function previewQR(input) {
            if(input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('qrPreview').src = e.target.result;
                    document.getElementById('qrPreview').style.display = 'block';
                    document.getElementById('qrPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveQR() {
            let preview = document.getElementById('qrPreview');
            let url = document.getElementById('qrUrl').value;
            let qrImage = (preview.src && preview.style.display !== 'none') ? preview.src : url;
            qrSettings = {
                qrImage: qrImage,
                bankName: document.getElementById('qrBankName').value,
                accountNumber: document.getElementById('qrAccountNumber').value,
                accountName: document.getElementById('qrAccountName').value
            };
            localStorage.setItem('qr_settings', JSON.stringify(qrSettings));
            showToast('QR settings saved!');
        }

        function showToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
