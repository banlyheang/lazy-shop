<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - L@ZY SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .admin-badge { background: #f59e0b; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
        .back-link { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 30px; color: white; text-decoration: none; font-size: 0.8rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 16px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #f59e0b; }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin: 4px;
            width: 100%;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
        .product-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; text-align: center; }
        .product-card .product-image { font-size: 2rem; }
        input, select, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }
        label { font-size: 0.8rem; margin-bottom: 4px; display: block; opacity: 0.8; }
        .orders-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content { background: #1e293b; border-radius: 28px; padding: 24px; max-width: 320px; width: 90%; }
        .close { float: right; font-size: 1.3rem; cursor: pointer; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideUp 0.3s;
        }
        .toast.error { background: #ef4444; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-buttons { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><h1>🔐 Admin</h1><p><span class="admin-badge">Administrator</span></p></div>
            <div><a href="index.html" class="back-link">← Shop</a> <a href="owner.html" class="back-link" style="background:#9C27B0;">Owner</a></div>
        </div>

        <div id="loginCard" style="background:rgba(255,255,255,0.05); border-radius:28px; padding:24px; text-align:center;">
            <h2>Admin Login</h2>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button class="btn btn-primary" onclick="adminLogin()">Login</button>
            <div id="loginError" style="color:#ef4444; margin-top:12px;"></div>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalRevenue">$0</div><div class="stat-label">Revenue</div></div>
                <div class="stat-card"><div class="stat-value" id="totalOrders">0</div><div class="stat-label">Orders</div></div>
                <div class="stat-card"><div class="stat-value" id="totalProducts">0</div><div class="stat-label">Products</div></div>
                <div class="stat-card"><div class="stat-value" id="totalCustomers">0</div><div class="stat-label">Customers</div></div>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showSection('products')">Products</button>
                <button class="tab-btn" onclick="showSection('orders')">Orders</button>
            </div>

            <div id="productsSection" class="tab-content active">
                <button class="btn btn-success" onclick="openAddProductModal()">+ Add Product</button>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <div id="ordersSection" class="tab-content">
                <input type="text" id="orderSearch" placeholder="Search orders..." onkeyup="filterOrders()">
                <div class="orders-table"><table><thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody id="ordersBody"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal"><div class="modal-content"><span class="close" onclick="closeProductModal()">&times;</span><h2 id="modalTitle">Add Product</h2><input type="hidden" id="productId"><label>Name</label><input type="text" id="productName"><label>Price</label><input type="number" id="productPrice" step="0.01"><label>Stock</label><input type="number" id="productStock"><label>Emoji</label><input type="text" id="productImage" placeholder="👕"><button class="btn btn-success" onclick="saveProduct()">Save</button><button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteProduct()">Delete</button></div></div>
    <div id="orderModal" class="modal"><div class="modal-content"><span class="close" onclick="closeOrderModal()">&times;</span><h2>Update Order</h2><div id="orderInfo"></div><select id="orderStatus"><option value="pending">Pending</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="delivered">Delivered</option></select><textarea id="orderMessage" rows="2" placeholder="Message..."></textarea><button class="btn btn-primary" onclick="updateOrder()">Update</button></div></div>

    <script>
        const TELEGRAM_WORKER = 'https://telegram-alert.banlyheang849.workers.dev';
        let adminAccounts = [{ username: "admin1", password: "admin123", name: "Admin" }, { username: "lixing", password: "lixing26", name: "Lixing" }];
        let products = [], orders = [], users = [];
        let currentAdmin = null, currentOrder = null;

        function init() { loadData(); renderStats(); renderProducts(); renderOrders(); }
        function loadData() { let p=localStorage.getItem('lazy_products'); if(p) products=JSON.parse(p); let o=localStorage.getItem('lazy_orders'); if(o) orders=JSON.parse(o); let u=localStorage.getItem('lazy_users'); if(u) users=JSON.parse(u); }
        function saveAll() { localStorage.setItem('lazy_products',JSON.stringify(products)); localStorage.setItem('lazy_orders',JSON.stringify(orders)); localStorage.setItem('lazy_users',JSON.stringify(users)); }
        function adminLogin() { let u=document.getElementById('adminUsername').value; let p=document.getElementById('adminPassword').value; let a=adminAccounts.find(a=>a.username===u&&a.password===p); if(a){ currentAdmin=a; document.getElementById('loginCard').style.display='none'; document.getElementById('adminPanel').style.display='block'; renderStats(); renderProducts(); renderOrders(); showToast(`Welcome ${a.name}!`); } else { document.getElementById('loginError').innerHTML='Invalid credentials!'; } }
        function renderStats() { let revenue=orders.filter(o=>o.payment_status==='paid').reduce((s,o)=>s+o.total_amount,0); document.getElementById('totalRevenue').innerHTML=`$${revenue.toFixed(2)}`; document.getElementById('totalOrders').innerHTML=orders.length; document.getElementById('totalProducts').innerHTML=products.length; document.getElementById('totalCustomers').innerHTML=users.length; }
        function showSection(s) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(`${s}Section`).classList.add('active'); event.target.classList.add('active'); if(s==='products') renderProducts(); if(s==='orders') renderOrders(); }
        function renderProducts() { document.getElementById('productsGrid').innerHTML=products.map(p=>`<div class="product-card"><div class="product-image">${p.image}</div><h3>${p.name}</h3><div>$${p.price}</div><div>📦 ${p.stock}</div><button class="btn btn-warning" onclick="editProduct(${p.id})">Edit</button><button class="btn btn-danger" onclick="deleteProductById(${p.id})">Del</button></div>`).join(''); }
        function openAddProductModal(p=null){ document.getElementById('modalTitle').innerHTML=p?'Edit':'Add'; document.getElementById('productId').value=p?.id||''; document.getElementById('productName').value=p?.name||''; document.getElementById('productPrice').value=p?.price||''; document.getElementById('productStock').value=p?.stock||''; document.getElementById('productImage').value=p?.image||'🛍️'; document.getElementById('deleteBtn').style.display=p?'inline-block':'none'; document.getElementById('productModal').style.display='flex'; }
        function editProduct(id){ let p=products.find(p=>p.id===id); if(p) openAddProductModal(p); }
        function deleteProductById(id){ if(confirm('Delete?')){ products=products.filter(p=>p.id!==id); saveAll(); renderProducts(); renderStats(); showToast('Deleted'); } }
        function deleteProduct(){ let id=parseInt(document.getElementById('productId').value); if(confirm('Delete?')){ products=products.filter(p=>p.id!==id); saveAll(); renderProducts(); renderStats(); closeProductModal(); showToast('Deleted'); } }
        function saveProduct(){ let id=parseInt(document.getElementById('productId').value); let name=document.getElementById('productName').value.trim(); let price=parseFloat(document.getElementById('productPrice').value); let stock=parseInt(document.getElementById('productStock').value); let image=document.getElementById('productImage').value.trim()||'🛍️'; if(!name||isNaN(price)){ showToast('Fill fields!','error'); return; } if(id){ let idx=products.findIndex(p=>p.id===id); if(idx!==-1) products[idx]={...products[idx],name,price,stock,image}; showToast('Updated'); } else { let newId=Math.max(...products.map(p=>p.id),0)+1; products.push({id:newId,name,price,stock,image,sales:0}); showToast('Added'); } saveAll(); renderProducts(); renderStats(); closeProductModal(); }
        function closeProductModal(){ document.getElementById('productModal').style.display='none'; }
        function renderOrders(){ let tbody=document.getElementById('ordersBody'); tbody.innerHTML=orders.map(o=>`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>$${o.total_amount}</td><td style="color:${o.order_status==='delivered'?'#10b981':'#f59e0b'}">${o.order_status}</td><td><button class="btn btn-primary" onclick="openOrderModal(${o.id})" style="padding:4px 8px;">✏️</button></td></tr>`).join(''); }
        function filterOrders(){ let s=document.getElementById('orderSearch').value.toLowerCase(); let filtered=orders.filter(o=>o.order_number.toLowerCase().includes(s)||o.customer_name.toLowerCase().includes(s)); document.getElementById('ordersBody').innerHTML=filtered.map(o=>`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>$${o.total_amount}</td><td>${o.order_status}</td><td><button class="btn btn-primary" onclick="openOrderModal(${o.id})" style="padding:4px 8px;">✏️</button></td></tr>`).join(''); }
        function openOrderModal(id){ currentOrder=orders.find(o=>o.id===id); if(currentOrder){ document.getElementById('orderInfo').innerHTML=`<p><strong>${currentOrder.order_number}</strong><br>${currentOrder.customer_name}</p>`; document.getElementById('orderStatus').value=currentOrder.order_status; document.getElementById('orderModal').style.display='flex'; } }
        function updateOrder(){ if(currentOrder){ currentOrder.order_status=document.getElementById('orderStatus').value; let msg=document.getElementById('orderMessage').value||`Status updated to ${currentOrder.order_status}`; if(!currentOrder.updates) currentOrder.updates=[]; currentOrder.updates.unshift({date:new Date().toISOString(),message:msg}); saveAll(); renderOrders(); renderStats(); closeOrderModal(); showToast('Order updated!'); } }
        function closeOrderModal(){ document.getElementById('orderModal').style.display='none'; }
        function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        init();
    </script>
</body>
</html>
