<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - L@ZY SHOP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { transform: translateY(-2px); }
        .message { text-align: center; margin-top: 20px; padding: 10px; border-radius: 8px; }
        .error { background: #fee; color: #c00; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .info { background: #e3f2fd; color: #1565c0; }
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Admin Login</h2>
        <p class="subtitle">Enter your credentials to access the admin panel</p>
        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="login()">Login</button>
        
        <div id="message" class="message"></div>
        
        <div class="demo-credentials">
            <strong>Demo Credentials:</strong><br>
            Username: admin1<br>
            Password: admin123<br><br>
            <strong>Owner:</strong> lixing / lixing26
        </div>
    </div>

    <script>
        const API_URL = "https://telegram-alert-bot.banlyheang849.workers.dev";
        
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!username || !password) {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ Please enter both username and password";
                return;
            }
            
            messageDiv.className = "message info";
            messageDiv.innerHTML = "🔐 Verifying credentials with cloud...";
            
            try {
                const response = await fetch(`${API_URL}/api/verify-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = "message success";
                    messageDiv.innerHTML = `✅ Welcome ${data.admin.name || username}! Redirecting...`;
                    
                    // Store session
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_username', username);
                    localStorage.setItem('admin_data', JSON.stringify(data.admin));
                    
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1500);
                } else {
                    messageDiv.className = "message error";
                    messageDiv.innerHTML = "❌ " + (data.error || "Invalid credentials!");
                }
            } catch (error) {
                messageDiv.className = "message error";
                messageDiv.innerHTML = "❌ Connection error. Please try again.";
            }
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
