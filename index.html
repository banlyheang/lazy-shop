<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>L@ZY SHOP - Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: #667eea; top: -200px; right: -200px; }
        .orb-2 { width: 500px; height: 500px; background: #764ba2; bottom: -250px; left: -250px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px 28px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .store-logo {
            width: 55px; height: 55px; border-radius: 28px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .store-info h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .store-info p { color: #94a3b8; font-size: 0.8rem; }
        .admin-link { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 40px; color: white; text-decoration: none; font-size: 0.85rem; transition: all 0.3s; }
        .admin-link:hover { background: linear-gradient(135deg, #6366f1, #ec4899); transform: translateY(-2px); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); border-color: #6366f1; }
        .stat-icon { font-size: 2rem; margin-bottom: 8px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #818cf8; }
        .stat-label { color: #94a3b8; font-size: 0.8rem; }
        .desktop-tabs { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 28px;
            border-radius: 40px;
            color: #cbd5e1;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover, .tab-btn.active { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; transform: translateY(-2px); }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .product-card:hover { transform: translateY(-8px); border-color: #6366f1; }
        .product-image { font-size: 4rem; margin-bottom: 15px; }
        .product-price { font-size: 1.6rem; font-weight: 700; color: #10b981; margin: 10px 0; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-outline { background: transparent; border: 1px solid #6366f1; color: #6366f1; }
        .btn-danger { background: #ef4444; color: white; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 28px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }
        .close { float: right; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; }
        .close:hover { color: #6366f1; }
        input, textarea {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 14px 18px;
            color: white;
            width: 100%;
            margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: #6366f1; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: 500; }
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            justify-content: space-around;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
        }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.1); }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            backdrop-filter: blur(12px);
            padding: 14px 24px;
            border-radius: 50px;
            animation: slideIn 0.3s ease;
            z-index: 2000;
            border-left: 4px solid #10b981;
        }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }
        .qr-display {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 24px;
            margin: 0 auto;
        }
        .qr-display img {
            max-width: 100%;
            border-radius: 16px;
        }
        .payment-timer {
            font-size: 0.9rem;
            color: #f59e0b;
            margin-top: 10px;
            font-weight: 600;
            text-align: center;
        }
        .order-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-pending { background: #f59e0b; color: #000; }
        .status-processing { background: #6366f1; color: white; }
        .status-shipped { background: #8b5cf6; color: white; }
        .status-delivered { background: #10b981; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .desktop-tabs { display: none; }
            .bottom-nav { display: flex; }
            .main-content { margin-bottom: 80px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .product-card { padding: 14px; }
            .product-image { font-size: 2.5rem; }
            .product-price { font-size: 1.2rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 12px; }
            .stat-value { font-size: 1.3rem; }
            .header { padding: 12px 16px; }
            .store-logo { width: 40px; height: 40px; font-size: 22px; }
            .store-info h1 { font-size: 1.2rem; }
            .toast { bottom: 80px; right: 16px; left: 16px; width: auto; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="store-logo">🛍️</div>
                <div class="store-info">
                    <h1>L@ZY SHOP</h1>
                    <p>✨ Premium Quality | Fast Delivery</p>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="admin.html" class="admin-link">🔐 Admin</a>
                <a href="owner.html" class="admin-link" style="background:#9C27B0;">👑 Owner</a>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-value" id="statOrders">0</div><div class="stat-label">Orders</div></div>
            <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value" id="statProducts">0</div><div class="stat-label">Products</div></div>
            <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="statCustomers">0</div><div class="stat-label">Customers</div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" id="statRevenue">$0</div><div class="stat-label">Revenue</div></div>
        </div>
        <div class="desktop-tabs">
            <button class="tab-btn active" onclick="switchTab('shop')">🛒 Shop</button>
            <button class="tab-btn" onclick="switchTab('cart')">🛍️ Cart (<span id="cartCountDesktop">0</span>)</button>
            <button class="tab-btn" onclick="switchTab('orders')">📦 My Orders</button>
            <button class="tab-btn" onclick="switchTab('track')">🚚 Track</button>
        </div>
        <div class="main-content">
            <div id="shop-tab" class="tab-content active"><div class="products-grid" id="productsGrid"></div></div>
            <div id="cart-tab" class="tab-content"><div class="card"><h2 style="color:#818cf8; margin-bottom:16px;">🛍️ Your Cart</h2><div id="cartItems"></div><div id="cartTotal" style="text-align:right; margin-top:16px;"></div><button class="btn btn-success" onclick="checkout()" style="width:100%; margin-top:16px;">✅ Checkout</button></div></div>
            <div id="orders-tab" class="tab-content"><div class="card"><h2 style="color:#818cf8; margin-bottom:16px;">📦 Order History</h2><div id="userOrdersList"></div></div></div>
            <div id="track-tab" class="tab-content"><div class="card"><h2 style="color:#818cf8; margin-bottom:16px;">🚚 Track Order</h2><label>Order Number</label><input type="text" id="trackOrderNumber" placeholder="e.g., ORD1234567890"><label>Phone Number</label><input type="text" id="trackPhoneNumber" placeholder="Your phone number"><button class="btn btn-primary" onclick="trackOrder()">🔍 Track Now</button><div id="trackResult" style="margin-top:16px;"></div></div></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTabMobile('shop')"><i class="fas fa-store"></i><span>Shop</span></button>
            <button class="nav-item" onclick="switchTabMobile('cart')"><i class="fas fa-shopping-cart"></i><span>Cart <span id="cartBadge" style="background:#ec4899; border-radius:10px; padding:0 6px; margin-left:4px;">0</span></span></button>
            <button class="nav-item" onclick="switchTabMobile('orders')"><i class="fas fa-box"></i><span>Orders</span></button>
            <button class="nav-item" onclick="switchTabMobile('track')"><i class="fas fa-truck"></i><span>Track</span></button>
        </div>
    </div>
    
    <div id="loginModal" class="modal">
        <div class="modal-content"><span class="close" onclick="closeLoginModal()">&times;</span><h2 style="color:#818cf8;">📞 Customer Login</h2><label>Phone Number</label><input type="tel" id="loginPhone" placeholder="85512345678"><label>Full Name</label><input type="text" id="loginName" placeholder="Your name"><button class="btn btn-success" onclick="loginUser()" style="width:100%;">Login / Register</button></div>
    </div>
    
    <div id="paymentModal" class="modal">
        <div class="modal-content"><span class="close" onclick="closePaymentModal()">&times;</span><h2 style="color:#818cf8;">🧾 Complete Payment</h2><div id="paymentContent"></div><div id="paymentTimer" class="payment-timer"></div><button class="btn btn-primary" onclick="checkPaymentStatus()" style="width:100%; margin-top:16px;">🔄 Check Payment Status</button><button class="btn btn-outline" onclick="closePaymentModal()" style="width:100%; margin-top:8px;">Cancel</button></div>
    </div>
    
    <div id="orderDetailsModal" class="modal">
        <div class="modal-content"><span class="close" onclick="closeOrderDetailsModal()">&times;</span><h2 style="color:#818cf8;">📋 Order Details</h2><div id="orderDetailsContent"></div></div>
    </div>

    <script>
        const KHPAY_API_KEY = "ak_9206f072a35196d022a0e8e2d9138b4e25b1d0f1de212589";
        const KHPAY_BASE_URL = "https://khpay.site/api/v1";
        const QR_EXPIRY_SECONDS = 300;

        let products = [], orders = [], users = [], cart = [], currentUser = null;
        let pendingPayments = {};
        let timerIntervals = {};
        const TELEGRAM_WORKER = "https://telegram-alert.banlyheang849.workers.dev";
        let telegramSettings = { botToken: "", chatId: "" };

        async function createKHQRPayment(orderNumber, amount, description) {
            try {
                const response = await fetch(`${KHPAY_BASE_URL}/khqr/create`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${KHPAY_API_KEY}` },
                    body: JSON.stringify({ amount: amount, currency: "USD", order_id: orderNumber, description: description, expire_seconds: QR_EXPIRY_SECONDS })
                });
                if (!response.ok) throw new Error(`KHPAY API error: ${response.status}`);
                const data = await response.json();
                return { success: true, qrCode: data.qr_code_url || data.qr_image, paymentId: data.payment_id || data.id, expiresAt: data.expires_at || Date.now() + (QR_EXPIRY_SECONDS * 1000) };
            } catch (error) {
                console.error("KHPAY QR generation failed:", error);
                const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify({ merchant: "Ban Lyheang", bank: "ABA", account: "001059172", amount: amount, orderId: orderNumber }))));
                return { success: true, qrCode: `https://quickchart.io/qr?text=${encodeURIComponent(encodedData)}&size=300`, paymentId: `fallback_${orderNumber}`, expiresAt: Date.now() + (QR_EXPIRY_SECONDS * 1000), isFallback: true };
            }
        }

        async function checkKHQRPaymentStatus(paymentId) {
            try {
                const response = await fetch(`${KHPAY_BASE_URL}/khqr/status/${paymentId}`, { method: "GET", headers: { "Authorization": `Bearer ${KHPAY_API_KEY}` } });
                if (!response.ok) throw new Error(`Status check error: ${response.status}`);
                const data = await response.json();
                return { success: true, status: data.status, amount: data.amount, paidAt: data.paid_at };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        function loadData() {
            let p = localStorage.getItem('lazy_products'); if(p) products = JSON.parse(p);
            else products = [{ id: 1, name: "Premium T-Shirt", price: 25.99, stock: 50, sales: 45, image: "👕" },{ id: 2, name: "Wireless Headphones", price: 49.99, stock: 30, sales: 38, image: "🎧" },{ id: 3, name: "Smart Watch", price: 89.99, stock: 20, sales: 25, image: "⌚" },{ id: 4, name: "Leather Backpack", price: 39.99, stock: 40, sales: 32, image: "🎒" },{ id: 5, name: "Sunglasses", price: 19.99, stock: 60, sales: 55, image: "🕶️" }];
            let o = localStorage.getItem('lazy_orders'); if(o) orders = JSON.parse(o); else orders = [];
            let u = localStorage.getItem('lazy_users'); if(u) users = JSON.parse(u); else users = [];
            let c = localStorage.getItem('lazy_cart'); if(c) cart = JSON.parse(c); else cart = [];
            let pends = localStorage.getItem('lazy_pending_payments'); if(pends) pendingPayments = JSON.parse(pends);
            let tg = localStorage.getItem('lazy_telegram_settings'); if(tg) telegramSettings = JSON.parse(tg);
        }

        function saveAll() {
            localStorage.setItem('lazy_products', JSON.stringify(products));
            localStorage.setItem('lazy_orders', JSON.stringify(orders));
            localStorage.setItem('lazy_users', JSON.stringify(users));
            localStorage.setItem('lazy_cart', JSON.stringify(cart));
            localStorage.setItem('lazy_pending_payments', JSON.stringify(pendingPayments));
        }

        async function sendTelegramAlert(message) {
            if(!telegramSettings.botToken || !telegramSettings.chatId) return false;
            try {
                let res = await fetch(TELEGRAM_WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ botToken: telegramSettings.botToken, chatId: telegramSettings.chatId, message: message }) });
                return (await res.json()).success;
            } catch(e) { return false; }
        }

        async function checkout() {
            if(!currentUser) { showToast('Please login first!', 'warning'); openLoginModal(); return; }
            if(!cart.length) { showToast('Cart is empty!', 'error'); return; }
            let total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
            let orderNumber = `ORD${Date.now()}${Math.floor(Math.random() * 1000)}`;
            let description = `L@ZY SHOP - ${currentUser.name} - ${orderNumber}`;
            showToast('Generating QR code...', 'info');
            document.getElementById('paymentContent').innerHTML = `<div style="text-align:center; padding:40px;"><div class="loading-spinner"></div><p>Generating QR Code...</p></div>`;
            document.getElementById('paymentModal').style.display = 'flex';
            let khqrResult = await createKHQRPayment(orderNumber, total, description);
            let newOrder = { id: Date.now(), order_number: orderNumber, customer_name: currentUser.name, customer_phone: currentUser.phone, total_amount: total, payment_status: "pending", order_status: "pending", created_at: new Date().toISOString(), items: [...cart], updates: [{ date: new Date().toISOString(), message: "Order placed - awaiting payment" }], khqr_payment_id: khqrResult.paymentId || null, qr_expires_at: khqrResult.expiresAt || null };
            orders.unshift(newOrder);
            pendingPayments[orderNumber] = { paymentId: khqrResult.paymentId, amount: total, qrCode: khqrResult.qrCode, expiresAt: khqrResult.expiresAt, createdAt: Date.now(), khqrSuccess: khqrResult.success, isFallback: khqrResult.isFallback || false };
            cart = []; saveAll(); updateCart(); updateCartBadge(); renderUserOrders(); updateStats();
            showPaymentModal(orderNumber, total, khqrResult);
            await sendTelegramAlert(`🛍️ *NEW ORDER*\nOrder: ${orderNumber}\nCustomer: ${currentUser.name}\nTotal: $${total.toFixed(2)}`);
        }

        function showPaymentModal(orderNumber, amount, khqrResult) {
            let expiryTime = khqrResult.expiresAt || Date.now() + (QR_EXPIRY_SECONDS * 1000);
            let qrHtml = khqrResult.success && khqrResult.qrCode ? `<div class="qr-display"><img src="${khqrResult.qrCode}" alt="KHQR Code" style="max-width:280px; width:100%; cursor:pointer;" onclick="window.open(this.src)"><p style="margin-top:15px; color:#10b981;">✅ QR Code Generated</p><p style="font-size:0.8rem; color:#94a3b8;">Scan with ABA Mobile or any banking app</p></div>` : `<div class="qr-display" style="background:#1e293b;"><div style="font-size:60px;">💳</div><p><strong>🏦 ABA Bank</strong></p><p><strong>📱 001059172</strong></p><p><strong>👤 Ban Lyheang</strong></p><p style="font-size:0.8rem; color:#f59e0b;">⚠️ Please transfer manually</p><button class="btn btn-outline" onclick="copyBankInfo()" style="margin-top:10px;">📋 Copy Bank Info</button></div>`;
            document.getElementById('paymentContent').innerHTML = `<div style="text-align:center;"><h3>Order: ${orderNumber}</h3><p>Amount: <strong style="color:#10b981;">$${amount.toFixed(2)}</strong></p>${qrHtml}<div style="margin-top:15px; padding:10px; background:rgba(255,255,255,0.05); border-radius:12px;"><p><strong>📌 Instructions:</strong></p><p>1. ${khqrResult.success ? 'Scan QR code' : 'Transfer to ABA account'}</p><p>2. Make payment of <strong>$${amount.toFixed(2)}</strong></p><p>3. Click "Check Payment Status" after paying</p></div></div>`;
            startPaymentTimer(expiryTime, orderNumber);
        }

        function copyBankInfo() { navigator.clipboard.writeText(`ABA Bank\nAccount: 001059172\nName: Ban Lyheang`); showToast('✅ Bank info copied!', 'success'); }

        function startPaymentTimer(expiryTime, orderNumber) {
            if (timerIntervals[orderNumber]) clearInterval(timerIntervals[orderNumber]);
            const timerElement = document.getElementById('paymentTimer');
            function updateTimer() {
                const remaining = Math.max(0, expiryTime - Date.now());
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                if (remaining <= 0) { timerElement.innerHTML = '⏰ QR Code Expired! Please contact support.'; timerElement.style.color = '#ef4444'; if (timerIntervals[orderNumber]) clearInterval(timerIntervals[orderNumber]); }
                else { timerElement.innerHTML = `⏱️ QR Code expires in: ${minutes}:${seconds.toString().padStart(2, '0')}`; }
            }
            updateTimer();
            timerIntervals[orderNumber] = setInterval(updateTimer, 1000);
        }

        async function checkPaymentStatus() {
            let pendingOrder = orders.find(o => o.payment_status === 'pending' && o.customer_phone === currentUser?.phone);
            if (!pendingOrder) { showToast('No pending order found', 'error'); return; }
            let paymentInfo = pendingPayments[pendingOrder.order_number];
            if (!paymentInfo || !paymentInfo.paymentId || paymentInfo.isFallback) { showToast('📞 Manual payment - Please contact admin', 'warning'); return; }
            showToast('Checking payment status...', 'info');
            let statusResult = await checkKHQRPaymentStatus(paymentInfo.paymentId);
            if (statusResult.success && statusResult.status === 'paid') {
                pendingOrder.payment_status = "paid"; pendingOrder.order_status = "processing";
                pendingOrder.updates.unshift({ date: new Date().toISOString(), message: `Payment confirmed - $${pendingOrder.total_amount}` });
                saveAll(); renderUserOrders(); updateStats();
                if (timerIntervals[pendingOrder.order_number]) clearInterval(timerIntervals[pendingOrder.order_number]);
                document.getElementById('paymentContent').innerHTML = `<div style="text-align:center;"><div style="font-size:60px;">✅</div><h3 style="color:#10b981;">Payment Confirmed!</h3><p>Order #${pendingOrder.order_number}</p><p>Amount: $${pendingOrder.total_amount}</p><button class="btn btn-success" onclick="closePaymentModal()" style="margin-top:15px;">Continue Shopping</button></div>`;
                await sendTelegramAlert(`💰 *PAYMENT CONFIRMED*\nOrder: ${pendingOrder.order_number}\nAmount: $${pendingOrder.total_amount}`);
                showToast('✅ Payment confirmed!', 'success');
            } else { showToast('⏳ Payment still pending. Please complete the transfer.', 'warning'); }
        }

        function updateStats() {
            document.getElementById('statOrders').innerHTML = orders.filter(o => o.payment_status === 'paid').length;
            document.getElementById('statProducts').innerHTML = products.length;
            document.getElementById('statCustomers').innerHTML = users.length;
            let revenue = orders.filter(o => o.payment_status === 'paid').reduce((s, o) => s + o.total_amount, 0);
            document.getElementById('statRevenue').innerHTML = `$${revenue.toFixed(2)}`;
        }

        function renderProducts() {
            document.getElementById('productsGrid').innerHTML = products.map(p => `<div class="product-card"><div class="product-image">${p.image}</div><h3>${p.name}</h3><div class="product-price">$${p.price}</div><div class="product-meta">⭐ ${p.sales||0} sold | 📦 ${p.stock} left</div><button class="btn btn-primary" onclick="addToCart(${p.id})">🛒 Add to Cart</button></div>`).join('');
        }

        function addToCart(id) { 
            let p = products.find(p => p.id === id); 
            if(!p || p.stock <= 0) { showToast('Out of stock!', 'error'); return; } 
            let e = cart.find(i => i.id === id); 
            if(e) e.quantity++; else cart.push({...p, quantity: 1}); 
            saveAll(); updateCart(); updateCartBadge(); showToast(`✅ ${p.name} added!`); 
        }

        function updateCart() { 
            let container = document.getElementById('cartItems'); 
            if(!cart.length) { container.innerHTML = '<div style="text-align:center; padding:40px;">🛒 Your cart is empty</div>'; document.getElementById('cartTotal').innerHTML = ''; return; } 
            let total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
            container.innerHTML = cart.map(i => `<div class="cart-item"><div><strong>${i.name}</strong><br><span style="color:#94a3b8;">$${i.price} x ${i.quantity}</span></div><div><strong>$${(i.price * i.quantity).toFixed(2)}</strong><br><button class="btn btn-outline" onclick="updateQty(${i.id}, ${i.quantity - 1})" style="padding:5px 10px;">-</button><button class="btn btn-outline" onclick="updateQty(${i.id}, ${i.quantity + 1})" style="padding:5px 10px;">+</button><button class="btn btn-danger" onclick="removeFromCart(${i.id})" style="padding:5px 10px;">🗑️</button></div></div>`).join('');
            document.getElementById('cartTotal').innerHTML = `<strong>Total: $${total.toFixed(2)}</strong>`;
            document.getElementById('cartCountDesktop').innerHTML = cart.reduce((s,i) => s + i.quantity, 0);
        }

        function updateQty(id, qty) { if(qty <= 0) removeFromCart(id); else { let i = cart.find(i => i.id === id); if(i) i.quantity = qty; saveAll(); updateCart(); updateCartBadge(); } }
        function removeFromCart(id) { cart = cart.filter(i => i.id !== id); saveAll(); updateCart(); updateCartBadge(); }
        function updateCartBadge() { document.getElementById('cartBadge').innerHTML = cart.reduce((s,i) => s + i.quantity, 0); }
        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function closePaymentModal() { document.getElementById('paymentModal').style.display = 'none'; for (let id in timerIntervals) { clearInterval(timerIntervals[id]); } timerIntervals = {}; }
        function closeOrderDetailsModal() { document.getElementById('orderDetailsModal').style.display = 'none'; }

        function loginUser() { 
            let phone = document.getElementById('loginPhone').value.trim(); 
            let name = document.getElementById('loginName').value.trim(); 
            if(!phone) { showToast('Enter phone number!', 'error'); return; } 
            let user = users.find(u => u.phone === phone); 
            if(!user) { user = { phone, name: name || "Customer", joined: new Date().toISOString() }; users.push(user); saveAll(); updateStats(); } 
            currentUser = user; localStorage.setItem('currentUser', JSON.stringify(user)); 
            closeLoginModal(); renderUserOrders(); showToast(`✨ Welcome ${user.name}!`); 
        }

        function checkUserSession() { let saved = localStorage.getItem('currentUser'); if(saved) { currentUser = JSON.parse(saved); renderUserOrders(); } }

        function getStatusClass(status) {
            const classes = { 'pending': 'status-pending', 'processing': 'status-processing', 'shipped': 'status-shipped', 'delivered': 'status-delivered', 'cancelled': 'status-cancelled' };
            return classes[status] || 'status-pending';
        }

        function renderUserOrders() { 
            let container = document.getElementById('userOrdersList');
            if(!currentUser) { container.innerHTML = '<p style="text-align:center; padding:40px;">🔐 Login to view orders</p><button class="btn btn-primary" onclick="openLoginModal()" style="display:block; margin:0 auto;">Login Now</button>'; return; } 
            let userOrders = orders.filter(o => o.customer_phone === currentUser.phone); 
            if(!userOrders.length) { container.innerHTML = '<p style="text-align:center; padding:40px;">📭 No orders yet. Start shopping!</p>'; return; } 
            container.innerHTML = userOrders.map(o => `<div style="background:rgba(255,255,255,0.05); border-radius:16px; padding:16px; margin-bottom:12px;"><div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px;"><div><strong>${o.order_number}</strong><br><span style="color:#94a3b8;">$${o.total_amount} | ${new Date(o.created_at).toLocaleDateString()}</span></div><div style="text-align:right;"><span class="order-status-badge ${getStatusClass(o.order_status)}">${o.order_status.toUpperCase()}</span><br>${o.payment_status === 'pending' ? `<button class="btn btn-primary" style="margin-top:8px; padding:6px 12px; font-size:0.75rem;" onclick="resumePayment('${o.order_number}')">💳 Pay Now</button>` : `<span style="color:#10b981; font-size:0.75rem;">✅ Paid</span>`}<button class="btn btn-outline" style="margin-top:8px; padding:6px 12px; font-size:0.75rem;" onclick="viewOrderDetails('${o.order_number}')">📋 Details</button></div></div></div>`).join('');
        }

        function resumePayment(orderNumber) {
            let order = orders.find(o => o.order_number === orderNumber);
            if (order && order.payment_status === 'pending') {
                let paymentInfo = pendingPayments[orderNumber];
                if (paymentInfo && paymentInfo.qrCode) { showPaymentModal(orderNumber, order.total_amount, { success: true, qrCode: paymentInfo.qrCode, paymentId: paymentInfo.paymentId, expiresAt: paymentInfo.expiresAt, isFallback: paymentInfo.isFallback || false }); if (paymentInfo.expiresAt) startPaymentTimer(paymentInfo.expiresAt, orderNumber); }
                else { createKHQRPayment(orderNumber, order.total_amount, `L@ZY SHOP Order ${orderNumber}`).then(khqrResult => { if (khqrResult.success) { pendingPayments[orderNumber] = { paymentId: khqrResult.paymentId, amount: order.total_amount, qrCode: khqrResult.qrCode, expiresAt: khqrResult.expiresAt, createdAt: Date.now(), khqrSuccess: true, isFallback: khqrResult.isFallback || false }; saveAll(); showPaymentModal(orderNumber, order.total_amount, khqrResult); if (khqrResult.expiresAt) startPaymentTimer(khqrResult.expiresAt, orderNumber); } else { showPaymentModal(orderNumber, order.total_amount, { success: false }); } }); }
            }
        }

        function viewOrderDetails(orderNumber) {
            let order = orders.find(o => o.order_number === orderNumber);
            if (!order) return;
            document.getElementById('orderDetailsContent').innerHTML = `<div><p><strong>Order #:</strong> ${order.order_number}</p><p><strong>Date:</strong> ${new Date(order.created_at).toLocaleString()}</p><p><strong>Status:</strong> <span class="order-status-badge ${getStatusClass(order.order_status)}">${order.order_status}</span></p><p><strong>Payment:</strong> ${order.payment_status === 'paid' ? '✅ Paid' : '⏳ Pending'}</p><p><strong>Total:</strong> <strong style="color:#10b981;">$${order.total_amount}</strong></p><hr style="margin:15px 0; border-color:rgba(255,255,255,0.1);"><p><strong>Items:</strong></p>${order.items.map(i => `<p>• ${i.name} x${i.quantity} = $${(i.price * i.quantity).toFixed(2)}</p>`).join('')}<hr style="margin:15px 0; border-color:rgba(255,255,255,0.1);"><p><strong>Order Updates:</strong></p>${order.updates ? order.updates.slice(0,5).map(u => `<p style="font-size:0.8rem; color:#94a3b8;">📅 ${new Date(u.date).toLocaleString()}<br>📝 ${u.message}</p>`).join('') : '<p>No updates</p>'}</div>`;
            document.getElementById('orderDetailsModal').style.display = 'flex';
        }

        function trackOrder() { 
            let orderNum = document.getElementById('trackOrderNumber').value.trim(); 
            let phone = document.getElementById('trackPhoneNumber').value.trim(); 
            let order = orders.find(o => o.order_number === orderNum && o.customer_phone === phone); 
            let resultDiv = document.getElementById('trackResult'); 
            if(!order) { resultDiv.innerHTML = '<div style="background:#ef444420; border-radius:16px; padding:16px;"><p>❌ Order not found!</p></div>'; return; } 
            resultDiv.innerHTML = `<div style="background:rgba(255,255,255,0.05); border-radius:16px; padding:16px;"><h3>📦 ${order.order_number}</h3><p><strong>Status:</strong> <span class="order-status-badge ${getStatusClass(order.order_status)}">${order.order_status}</span></p><p><strong>Payment:</strong> ${order.payment_status === 'paid' ? '✅ Paid' : '⏳ Pending'}</p><p><strong>Total:</strong> $${order.total_amount}</p>${order.payment_status === 'pending' ? `<button class="btn btn-primary" style="margin-top:15px;" onclick="resumePayment('${order.order_number}')">💳 Pay Now</button>` : ''}<button class="btn btn-outline" style="margin-top:15px;" onclick="viewOrderDetails('${order.order_number}')">📋 View Details</button></div>`; 
        }

        function showToast(msg, type = 'success') { let t = document.createElement('div'); t.className = `toast ${type === 'error' ? 'error' : type === 'warning' ? 'warning' : ''}`; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

        function switchTab(tab) { 
            let tabs = ['shop', 'cart', 'orders', 'track'];
            tabs.forEach(t => { let tabEl = document.getElementById(`${t}-tab`); if(tabEl) tabEl.classList.remove('active'); });
            document.querySelectorAll('.desktop-tabs .tab-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(`${tab}-tab`).classList.add('active');
            if(event && event.target) event.target.classList.add('active'); 
            if(tab === 'orders') renderUserOrders(); 
        }

        function switchTabMobile(tab) { 
            let tabs = ['shop', 'cart', 'orders', 'track'];
            tabs.forEach(t => { let tabEl = document.getElementById(`${t}-tab`); if(tabEl) tabEl.classList.remove('active'); });
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            document.getElementById(`${tab}-tab`).classList.add('active');
            if(event && event.target) event.target.closest('.nav-item').classList.add('active'); 
            if(tab === 'orders') renderUserOrders(); 
        }

        loadData(); checkUserSession(); renderProducts(); updateCart(); updateCartBadge(); renderUserOrders(); updateStats();
    </script>
</body>
</html>
