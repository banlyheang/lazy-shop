<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>L@ZY SHOP - Mobile App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, rgba(255, 255, 255, 0) 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #667eea;
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #764ba2;
            bottom: -150px;
            left: -150px;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #f093fb;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 12px 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .store-logo {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .store-info h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .store-info p {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .admin-links {
            display: flex;
            gap: 8px;
        }

        .admin-link {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 8px;
            border-radius: 12px;
        }

        .nav-item i {
            font-size: 1.3rem;
        }

        .nav-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item:hover {
            color: #fff;
            transform: translateY(-2px);
        }

        /* Main Content Area */
        .main-content {
            margin-bottom: 80px;
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .section-header a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            text-decoration: none;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.15);
        }

        .product-image {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .product-card h3 {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fbbf24;
            margin: 8px 0;
        }

        .product-meta {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        /* Cart Items */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-bottom: 8px;
        }

        /* Order Items */
        .order-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 28px;
            padding: 24px;
            max-width: 320px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-content h2 {
            font-size: 1.3rem;
            margin-bottom: 16px;
        }

        .close {
            float: right;
            font-size: 1.3rem;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Inputs */
        input, textarea {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.8rem;
            margin-bottom: 4px;
            display: block;
            opacity: 0.8;
        }

        /* Hide tabs content initially */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <div class="store-logo">🛍️</div>
                <div class="store-info">
                    <h1>L@ZY SHOP</h1>
                    <p>Premium Quality • Fast Delivery</p>
                </div>
            </div>
            <div class="admin-links">
                <a href="admin.html" class="admin-link">Admin</a>
                <a href="owner.html" class="admin-link">Owner</a>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-value" id="statOrders">0</div><div class="stat-label">Orders</div></div>
            <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value" id="statProducts">0</div><div class="stat-label">Products</div></div>
            <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="statCustomers">0</div><div class="stat-label">Customers</div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" id="statRevenue">$0</div><div class="stat-label">Revenue</div></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Shop Tab -->
            <div id="shop-tab" class="tab-content active">
                <div class="section-header">
                    <h2>🔥 Featured Products</h2>
                    <a href="#">View All</a>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <!-- Cart Tab -->
            <div id="cart-tab" class="tab-content">
                <div class="section-header"><h2>🛍️ Your Cart</h2></div>
                <div id="cartItems"></div>
                <div id="cartTotal" style="text-align:right; margin-top:16px;"></div>
                <button class="btn btn-success" onclick="checkout()" style="margin-top:16px;">Checkout →</button>
            </div>

            <!-- Orders Tab -->
            <div id="orders-tab" class="tab-content">
                <div class="section-header"><h2>📦 Recent Orders</h2></div>
                <div id="userOrdersList"></div>
            </div>

            <!-- Track Tab -->
            <div id="track-tab" class="tab-content">
                <div class="section-header"><h2>🚚 Track Order</h2></div>
                <input type="text" id="trackOrderNumber" placeholder="Order Number">
                <input type="text" id="trackPhoneNumber" placeholder="Phone Number">
                <button class="btn btn-primary" onclick="trackOrder()">Track Now</button>
                <div id="trackResult" style="margin-top:16px;"></div>
            </div>

            <!-- Profile Tab -->
            <div id="profile-tab" class="tab-content">
                <div class="section-header"><h2>👤 My Profile</h2></div>
                <div id="profileInfo" style="background:rgba(255,255,255,0.05); border-radius:20px; padding:20px;">
                    <p id="userNameDisplay">Not logged in</p>
                    <button class="btn btn-primary" onclick="openLoginModal()" style="margin-top:16px;">Login</button>
                    <button class="btn btn-outline" onclick="logout()" id="logoutBtn" style="display:none; margin-top:8px;">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('shop')"><i class="fas fa-store"></i><span>Shop</span></button>
        <button class="nav-item" onclick="switchTab('cart')"><i class="fas fa-shopping-cart"></i><span>Cart <span id="cartBadge" style="background:#ec4899; border-radius:10px; padding:0 6px; margin-left:4px;">0</span></span></button>
        <button class="nav-item" onclick="switchTab('orders')"><i class="fas fa-box"></i><span>Orders</span></button>
        <button class="nav-item" onclick="switchTab('track')"><i class="fas fa-truck"></i><span>Track</span></button>
        <button class="nav-item" onclick="switchTab('profile')"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>Welcome Back</h2>
            <label>Phone Number</label>
            <input type="tel" id="loginPhone" placeholder="85512345678">
            <label>Full Name</label>
            <input type="text" id="loginName" placeholder="Your name">
            <button class="btn btn-success" onclick="loginUser()" style="width:100%;">Login / Register</button>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReceiptModal()">&times;</span>
            <h2>Receipt</h2>
            <div id="receiptContent"></div>
            <button class="btn btn-primary" onclick="downloadReceipt()" style="width:100%; margin-top:16px;">Download PDF</button>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        let products = [
            { id: 1, name: "Premium T-Shirt", price: 25.99, stock: 50, sales: 45, image: "👕" },
            { id: 2, name: "Wireless Headphones", price: 49.99, stock: 30, sales: 38, image: "🎧" },
            { id: 3, name: "Smart Watch", price: 89.99, stock: 20, sales: 25, image: "⌚" },
            { id: 4, name: "Leather Backpack", price: 39.99, stock: 40, sales: 32, image: "🎒" },
            { id: 5, name: "Sunglasses", price: 19.99, stock: 60, sales: 55, image: "🕶️" }
        ];
        let orders = [], users = [], cart = [], currentUser = null;

        function init() { loadData(); renderProducts(); updateCart(); renderUserOrders(); updateCartBadge(); updateStats(); checkUserSession(); }
        function loadData() { let p=localStorage.getItem('lazy_products'); if(p) products=JSON.parse(p); let o=localStorage.getItem('lazy_orders'); if(o) orders=JSON.parse(o); let u=localStorage.getItem('lazy_users'); if(u) users=JSON.parse(u); let c=localStorage.getItem('lazy_cart'); if(c) cart=JSON.parse(c); }
        function saveAll() { localStorage.setItem('lazy_products',JSON.stringify(products)); localStorage.setItem('lazy_orders',JSON.stringify(orders)); localStorage.setItem('lazy_users',JSON.stringify(users)); localStorage.setItem('lazy_cart',JSON.stringify(cart)); }
        function updateStats() { document.getElementById('statOrders').innerHTML=orders.filter(o=>o.payment_status==='paid').length; document.getElementById('statProducts').innerHTML=products.length; document.getElementById('statCustomers').innerHTML=users.length; let revenue=orders.filter(o=>o.payment_status==='paid').reduce((s,o)=>s+o.total_amount,0); document.getElementById('statRevenue').innerHTML=`$${revenue.toFixed(2)}`; }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');
            if(tab === 'orders') renderUserOrders();
        }

        function renderProducts() {
            let grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-image">${p.image}</div>
                    <h3>${p.name}</h3>
                    <div class="product-price">$${p.price}</div>
                    <div class="product-meta">🔥 ${p.sales} sold</div>
                    <button class="btn btn-primary" onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(id) { let p=products.find(p=>p.id===id); if(!p||p.stock<=0){ showToast('Out of stock!','error'); return; } let e=cart.find(i=>i.id===id); if(e) e.quantity++; else cart.push({...p,quantity:1}); saveAll(); updateCart(); updateCartBadge(); showToast(`✅ ${p.name} added!`); }
        function updateCart() { let container=document.getElementById('cartItems'); if(!cart.length){ container.innerHTML='<div style="text-align:center; padding:40px;">🛒 Your cart is empty</div>'; document.getElementById('cartTotal').innerHTML=''; return; } let total=cart.reduce((s,i)=>s+(i.price*i.quantity),0); container.innerHTML=cart.map(i=>`<div class="cart-item"><div><strong>${i.name}</strong><br>$${i.price} x ${i.quantity}</div><div><strong>$${(i.price*i.quantity).toFixed(2)}</strong><br><button class="btn btn-outline" onclick="updateQty(${i.id},${i.quantity-1})" style="padding:4px 8px;">-</button><button class="btn btn-outline" onclick="updateQty(${i.id},${i.quantity+1})" style="padding:4px 8px;">+</button><button class="btn btn-outline" onclick="removeFromCart(${i.id})" style="padding:4px 8px;">🗑️</button></div></div>`).join(''); document.getElementById('cartTotal').innerHTML=`<strong>Total: $${total.toFixed(2)}</strong>`; }
        function updateQty(id,qty){ if(qty<=0) removeFromCart(id); else{ let i=cart.find(i=>i.id===id); if(i) i.quantity=qty; saveAll(); updateCart(); updateCartBadge(); } }
        function removeFromCart(id){ cart=cart.filter(i=>i.id!==id); saveAll(); updateCart(); updateCartBadge(); }
        function updateCartBadge(){ document.getElementById('cartBadge').innerHTML = cart.reduce((s,i)=>s+i.quantity,0); }

        function checkout(){ if(!currentUser){ showToast('Please login first!','warning'); openLoginModal(); return; } if(!cart.length){ showToast('Cart empty!','error'); return; } let total=cart.reduce((s,i)=>s+(i.price*i.quantity),0); let orderNumber=`ORD${Date.now()}${Math.floor(Math.random()*1000)}`; orders.unshift({id:orders.length+1,order_number:orderNumber,customer_name:currentUser.name,customer_phone:currentUser.phone,total_amount:total,payment_status:"pending",order_status:"pending",created_at:new Date().toISOString(),items:[...cart],updates:[{date:new Date().toISOString(),message:"Order placed"}]}); cart=[]; saveAll(); updateCart(); updateCartBadge(); renderUserOrders(); updateStats(); showToast(`✅ Order placed! #${orderNumber}`); showPayment(orderNumber,total); }
        function showPayment(orderNumber,amount){ document.getElementById('receiptContent').innerHTML=`<div style="text-align:center;"><h3>Payment Required</h3><p>Order: ${orderNumber}</p><p>Amount: <strong>$${amount.toFixed(2)}</strong></p><div style="background:#2d2d44; padding:20px; border-radius:16px; margin:15px 0;"><p>🏦 ABA Bank</p><p>📱 001059172</p><p>👤 Ban Lyheang</p></div><button class="btn btn-success" onclick="markPaid('${orderNumber}')">I Have Paid</button></div>`; document.getElementById('receiptModal').style.display='flex'; }
        function markPaid(orderNumber){ let order=orders.find(o=>o.order_number===orderNumber); if(order){ order.payment_status="paid"; order.order_status="processing"; order.updates.unshift({date:new Date().toISOString(),message:"Payment confirmed"}); saveAll(); renderUserOrders(); updateStats(); showToast('✅ Payment confirmed!'); } closeReceiptModal(); }
        function downloadReceipt(){ let w=window.open('','_blank'); w.document.write(`<html><head><title>Receipt</title><style>body{font-family:Arial;padding:40px;}</style></head><body>${document.getElementById('receiptContent').innerHTML}<script>window.print();<\/script></body></html>`); w.document.close(); }
        function closeReceiptModal(){ document.getElementById('receiptModal').style.display='none'; }

        function openLoginModal(){ document.getElementById('loginModal').style.display='flex'; }
        function closeLoginModal(){ document.getElementById('loginModal').style.display='none'; }
        function loginUser(){ let phone=document.getElementById('loginPhone').value.trim(); let name=document.getElementById('loginName').value.trim(); if(!phone){ showToast('Enter phone!','error'); return; } let user=users.find(u=>u.phone===phone); if(!user){ user={phone,name:name||"Customer",joined:new Date().toISOString()}; users.push(user); saveAll(); updateStats(); } currentUser=user; localStorage.setItem('currentUser',JSON.stringify(user)); document.getElementById('userNameDisplay').innerHTML=`👤 ${user.name}`; document.getElementById('logoutBtn').style.display='inline-block'; closeLoginModal(); renderUserOrders(); showToast(`✨ Welcome ${user.name}!`); }
        function logout(){ currentUser=null; localStorage.removeItem('currentUser'); document.getElementById('userNameDisplay').innerHTML='Not logged in'; document.getElementById('logoutBtn').style.display='none'; renderUserOrders(); showToast('Logged out'); }
        function checkUserSession(){ let saved=localStorage.getItem('currentUser'); if(saved){ currentUser=JSON.parse(saved); document.getElementById('userNameDisplay').innerHTML=`👤 ${currentUser.name}`; document.getElementById('logoutBtn').style.display='inline-block'; } }

        function renderUserOrders(){ if(!currentUser){ document.getElementById('userOrdersList').innerHTML='<p style="text-align:center; padding:40px;">Login to view orders</p>'; return; } let userOrders=orders.filter(o=>o.customer_phone===currentUser.phone); if(!userOrders.length){ document.getElementById('userOrdersList').innerHTML='<p style="text-align:center; padding:40px;">No orders yet</p>'; return; } document.getElementById('userOrdersList').innerHTML=userOrders.map(o=>`<div class="order-item"><div><strong>${o.order_number}</strong><br>$${o.total_amount}<br>${new Date(o.created_at).toLocaleDateString()}</div><div><span style="background:${o.payment_status==='paid'?'#10b981':'#f59e0b'}; padding:4px 12px; border-radius:20px;">${o.order_status}</span><br><button class="btn btn-outline" onclick="viewReceipt('${o.order_number}')" style="margin-top:8px;">Receipt</button></div></div>`).join(''); }
        function viewReceipt(orderNumber){ let order=orders.find(o=>o.order_number===orderNumber); if(!order) return; document.getElementById('receiptContent').innerHTML=`<div style="text-align:center;"><div style="font-size:3rem;">🛍️</div><h2>L@ZY SHOP</h2><hr><p><strong>Order:</strong> ${order.order_number}</p><p><strong>Customer:</strong> ${order.customer_name}</p><p><strong>Amount:</strong> $${order.total_amount}</p><hr><p>Thank you!</p></div>`; document.getElementById('receiptModal').style.display='flex'; }

        function trackOrder(){ let orderNum=document.getElementById('trackOrderNumber').value.trim(); let phone=document.getElementById('trackPhoneNumber').value.trim(); let order=orders.find(o=>o.order_number===orderNum && o.customer_phone===phone); let resultDiv=document.getElementById('trackResult'); if(!order){ resultDiv.innerHTML='<div style="background:#ef444420; border-radius:16px; padding:16px;"><p>❌ Order not found!</p></div>'; return; } resultDiv.innerHTML=`<div style="background:rgba(255,255,255,0.05); border-radius:16px; padding:16px;"><h3>${order.order_number}</h3><p>Status: ${order.order_status}</p><p>Total: $${order.total_amount}</p><button class="btn btn-outline" onclick="viewReceipt('${order.order_number}')" style="margin-top:8px;">View Receipt</button></div>`; }

        function showToast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        checkUserSession(); init();
    </script>
</body>
</html>
