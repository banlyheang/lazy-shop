<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>L@ZY SHOP - Customer Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 40px;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ec4899;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; }
        .btn-info { background: #06b6d4; color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        .product-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.1); }
        .product-card .product-image { font-size: 4rem; margin-bottom: 15px; }
        .product-price { font-size: 1.5rem; color: #f59e0b; font-weight: bold; margin: 10px 0; }
        .product-stock { font-size: 0.8rem; color: #94a3b8; margin-bottom: 15px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 28px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content.large { max-width: 800px; }
        .close { float: right; font-size: 1.5rem; cursor: pointer; }
        .close:hover { color: #f59e0b; }
        input, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .cart-total {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: right;
            border-top: 2px solid rgba(255,255,255,0.2);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            padding: 15px 25px;
            border-radius: 50px;
            animation: slideIn 0.3s;
            z-index: 2000;
        }
        .toast.error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .user-info-bar {
            background: rgba(16,185,129,0.2);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .empty-cart { text-align: center; padding: 40px; color: #94a3b8; }
        #trackingMap { height: 400px; border-radius: 16px; margin: 15px 0; }
        .status-timeline {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-step {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
        }
        .status-step.completed { background: rgba(16,185,129,0.3); border: 1px solid #10b981; }
        .status-step.active { background: rgba(245,158,11,0.3); border: 1px solid #f59e0b; }
        .order-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .secret-admin {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            opacity: 0.1;
            cursor: pointer;
            z-index: 999;
        }
        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><h1>🛍️ L@ZY SHOP</h1><p>Premium Products</p></div>
            <div class="nav-links">
                <a href="#" class="nav-btn" onclick="showShop()"><i class="fas fa-store"></i> Shop</a>
                <a href="#" class="nav-btn" onclick="showOrders()"><i class="fas fa-truck"></i> My Orders</a>
                <div class="cart-icon" onclick="openCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
            </div>
        </div>
        <div id="userInfoSection" class="user-info-bar">
            <div><i class="fas fa-user-circle"></i> <span id="userNameDisplay">Not logged in</span></div>
            <button class="btn btn-outline" onclick="openRegister()" id="loginRegisterBtn"><i class="fas fa-sign-in-alt"></i> Register / Login</button>
        </div>
        <div id="shopSection"><h2>⭐ Featured Products</h2><div class="products-grid" id="productsGrid"></div></div>
        <div id="ordersSection" style="display:none;"><h2>📦 My Orders</h2><div id="userOrdersList"></div></div>
    </div>
    <div class="secret-admin" ondblclick="openAdminLogin()"></div>

    <!-- Modals (simplified for space - include all modals here) -->
    <div id="adminLoginModal" class="modal"><div class="modal-content"><span class="close" onclick="closeAdminLogin()">&times;</span><h2>Admin Login</h2><input type="text" id="adminUsername" placeholder="Username"><input type="password" id="adminPassword" placeholder="Password"><button class="btn btn-primary" onclick="adminLogin()">Login</button></div></div>
    <div id="registerModal" class="modal"><div class="modal-content"><span class="close" onclick="closeRegister()">&times;</span><h2>Register</h2><input type="text" id="userName" placeholder="Full Name"><input type="tel" id="userPhone" placeholder="Phone Number"><button class="btn btn-success" onclick="register()">Continue</button></div></div>
    <div id="cartModal" class="modal"><div class="modal-content"><span class="close" onclick="closeCart()">&times;</span><h2>Your Cart</h2><div id="cartItems"></div><div class="cart-total" id="cartTotal"></div><button class="btn btn-primary" onclick="checkout()">Checkout</button></div></div>

    <script>
        let products = [], currentUser = null, cart = [], selectedLocation = null;
        const adminAccounts = [{ username: "admin1", password: "admin123" }, { username: "lixing", password: "lixing26" }];
        
        function loadProducts() {
            let stored = localStorage.getItem('lazy_products');
            if(stored) products = JSON.parse(stored);
            else products = [
                { id: 1, name: "Premium T-Shirt", price: 25.99, stock: 50, image: "👕" },
                { id: 2, name: "Wireless Headphones", price: 49.99, stock: 30, image: "🎧" },
                { id: 3, name: "Smart Watch", price: 89.99, stock: 20, image: "⌚" },
                { id: 4, name: "Telegram Premium", price: 13.99, stock: 9, image: "🚀" }
            ];
            renderProducts();
        }
        
        function renderProducts() {
            let grid = document.getElementById('productsGrid');
            if(grid) grid.innerHTML = products.map(p => `<div class="product-card"><div class="product-image">${p.image}</div><h3>${p.name}</h3><div class="product-price">$${p.price}</div><div class="product-stock">📦 ${p.stock} left</div><button class="btn btn-primary" onclick="addToCart(${p.id})">Add to Cart</button></div>`).join('');
        }
        
        function addToCart(id) {
            if(!currentUser) { openRegister(); return; }
            let p = products.find(p => p.id === id);
            if(p && p.stock > 0) {
                let existing = cart.find(i => i.id === id);
                existing ? existing.quantity++ : cart.push({ ...p, quantity: 1 });
                saveCart();
                showToast(`${p.name} added!`);
            }
        }
        
        function saveCart() { if(currentUser) localStorage.setItem(`cart_${currentUser.phone}`, JSON.stringify(cart)); updateCartUI(); }
        function updateCartUI() { document.getElementById('cartCount').innerHTML = cart.reduce((s,i) => s + i.quantity, 0); }
        function openCart() { /* show cart modal */ }
        function register() { let name = document.getElementById('userName').value, phone = document.getElementById('userPhone').value; if(name && phone) { currentUser = { name, phone }; document.getElementById('userNameDisplay').innerHTML = name; closeRegister(); showToast(`Welcome ${name}!`); } }
        function openAdminLogin() { document.getElementById('adminLoginModal').style.display = 'flex'; }
        function closeAdminLogin() { document.getElementById('adminLoginModal').style.display = 'none'; }
        function adminLogin() { let u = document.getElementById('adminUsername').value, p = document.getElementById('adminPassword').value; if(adminAccounts.find(a => a.username === u && a.password === p)) { closeAdminLogin(); window.location.href = 'owner.html'; } else showToast('Invalid', 'error'); }
        function showShop() { document.getElementById('shopSection').style.display = 'block'; document.getElementById('ordersSection').style.display = 'none'; }
        function showOrders() { document.getElementById('shopSection').style.display = 'none'; document.getElementById('ordersSection').style.display = 'block'; }
        function showToast(msg, type='success') { let t = document.createElement('div'); t.className = `toast ${type === 'error' ? 'error' : ''}`; t.innerHTML = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function openRegister() { document.getElementById('registerModal').style.display = 'flex'; }
        function closeRegister() { document.getElementById('registerModal').style.display = 'none'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
        function checkout() { /* checkout logic */ }
        
        loadProducts();
        if(localStorage.getItem('current_user')) currentUser = JSON.parse(localStorage.getItem('current_user'));
    </script>
</body>
</html>
