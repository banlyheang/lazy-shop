<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>L@ZY SHOP - Complete Admin System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .store-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
        }

        .store-info h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-panel {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .login-btn, .logout-btn {
            background: #667eea;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .logout-btn {
            background: #f44336;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card h2, .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            border-left: 3px solid #667eea;
            padding-left: 15px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
        }

        .product-price {
            font-size: 1.5rem;
            color: #4CAF50;
            font-weight: bold;
        }

        .admin-product-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-warning { background: #FF9800; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn-info { background: #2196F3; color: white; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Forms */
        input, select, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 12px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        /* Orders Table */
        .orders-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #667eea;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }

        .close:hover { color: white; }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .notification.error { background: #f44336; }
        .notification.warning { background: #FF9800; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .header { flex-direction: column; text-align: center; }
            .tab-btn { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <div class="store-logo" id="storeLogo">🛍️</div>
                <div class="store-info">
                    <h1 id="storeName">L@ZY SHOP</h1>
                    <p id="storeSlogan">Quality Products | Fast Delivery</p>
                </div>
            </div>
            <div class="user-panel" id="userPanel">
                <div class="user-phone" id="userPhoneDisplay">Not logged in</div>
                <button class="login-btn" id="loginBtn" onclick="openLoginModal()">📞 Login</button>
                <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('shop')">🛒 SHOP</button>
            <button class="tab-btn" onclick="switchTab('cart')">🛒 CART (<span id="cartCount">0</span>)</button>
            <button class="tab-btn" onclick="switchTab('orders')">📦 MY ORDERS</button>
            <button class="tab-btn" onclick="switchTab('track')">🚚 TRACK</button>
            <button class="tab-btn" id="adminTabBtn" style="display:none;" onclick="switchTab('admin')">🔐 ADMIN</button>
        </div>

        <!-- SHOP TAB -->
        <div id="shop-tab" class="tab-content active">
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- CART TAB -->
        <div id="cart-tab" class="tab-content">
            <div class="card">
                <h2>🛒 Your Cart</h2>
                <div id="cartItems"></div>
                <div id="cartTotal" style="text-align: right; font-size: 1.3rem; margin-top: 15px;"></div>
                <button class="btn btn-success" onclick="checkout()" style="width: 100%; padding: 15px;">✅ CHECKOUT</button>
            </div>
        </div>

        <!-- ORDERS TAB -->
        <div id="orders-tab" class="tab-content">
            <div class="card">
                <h2>📦 My Orders</h2>
                <div id="userOrdersList"></div>
            </div>
        </div>

        <!-- TRACK TAB -->
        <div id="track-tab" class="tab-content">
            <div class="card">
                <h2>🚚 Track Order</h2>
                <label>Order Number</label>
                <input type="text" id="trackOrderNumber" placeholder="Order number">
                <label>Phone Number</label>
                <input type="text" id="trackPhoneNumber" placeholder="Your phone number">
                <button class="btn btn-primary" onclick="trackOrderByPhone()">Track</button>
                <div id="trackResult"></div>
            </div>
        </div>

        <!-- ADMIN TAB -->
        <div id="admin-tab" class="tab-content">
            <div class="card" id="adminLoginCard">
                <h2>🔐 Admin Login</h2>
                <input type="password" id="adminPassword" placeholder="Admin ID">
                <button class="btn btn-primary" onclick="adminLogin()">Login</button>
                <div id="adminError" style="color: #f44336;"></div>
            </div>

            <div id="adminPanel" style="display: none;">
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="adminTotalOrders">0</div><div class="stat-label">Orders</div></div>
                    <div class="stat-card"><div class="stat-value" id="adminTotalRevenue">$0</div><div class="stat-label">Revenue</div></div>
                    <div class="stat-card"><div class="stat-value" id="adminTotalProducts">0</div><div class="stat-label">Products</div></div>
                    <div class="stat-card"><div class="stat-value" id="adminTotalUsers">0</div><div class="stat-label">Users</div></div>
                </div>

                <!-- Admin Sub Tabs -->
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="showAdminSection('products')">📦 Manage Products</button>
                    <button class="btn btn-primary" onclick="showAdminSection('orders')">📋 Manage Orders</button>
                    <button class="btn btn-primary" onclick="showAdminSection('settings')">⚙️ Store Settings</button>
                    <button class="btn btn-primary" onclick="showAdminSection('logo')">🖼️ Logo</button>
                </div>

                <!-- Products Management Section -->
                <div id="adminProductsSection">
                    <div style="margin-bottom: 20px;">
                        <button class="btn btn-success" onclick="openAddProductModal()">➕ Add New Product</button>
                    </div>
                    <div class="products-grid" id="adminProductsGrid"></div>
                </div>

                <!-- Orders Management Section -->
                <div id="adminOrdersSection" style="display: none;">
                    <input type="text" id="adminSearch" placeholder="Search orders..." style="margin-bottom: 15px;" onkeyup="filterAdminOrders()">
                    <div class="orders-table">
                        <table>
                            <thead><tr><th>Order #</th><th>Customer</th><th>Phone</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
                            <tbody id="adminOrdersBody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Settings Section -->
                <div id="adminSettingsSection" style="display: none;">
                    <div class="card">
                        <h3>Store Settings</h3>
                        <label>Store Name</label>
                        <input type="text" id="storeNameInput">
                        <label>Store Slogan</label>
                        <input type="text" id="storeSloganInput">
                        <label>Contact Phone</label>
                        <input type="text" id="storePhoneInput">
                        <label>Contact Email</label>
                        <input type="email" id="storeEmailInput">
                        <button class="btn btn-primary" onclick="saveStoreSettings()">Save Settings</button>
                    </div>
                </div>

                <!-- Logo Section -->
                <div id="adminLogoSection" style="display: none;">
                    <div class="card">
                        <h3>Store Logo</h3>
                        <div style="text-align: center; margin-bottom: 20px;">
                            <img id="logoPreview" src="" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                        </div>
                        <label>Upload Image</label>
                        <input type="file" id="logoUpload" accept="image/*" onchange="previewLogo(this)">
                        <label>Or Image URL</label>
                        <input type="text" id="logoUrl" placeholder="https://example.com/logo.png">
                        <button class="btn btn-primary" onclick="saveLogo()">Save Logo</button>
                        <button class="btn btn-danger" onclick="resetLogo()">Reset to Default</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>Login / Register</h2>
            <label>Phone Number</label>
            <input type="tel" id="loginPhone" placeholder="85512345678">
            <label>Full Name</label>
            <input type="text" id="loginName" placeholder="Your name">
            <button class="btn btn-success" onclick="loginUser()">Login</button>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProductModal()">&times;</span>
            <h2 id="productModalTitle">Add New Product</h2>
            <input type="hidden" id="productId">
            <label>Product Name</label>
            <input type="text" id="productName" placeholder="Product name">
            <label>Price ($)</label>
            <input type="number" id="productPrice" step="0.01" placeholder="0.00">
            <label>Stock Quantity</label>
            <input type="number" id="productStock" placeholder="Stock (-1 for unlimited)">
            <label>Product Icon (Emoji)</label>
            <input type="text" id="productImage" placeholder="e.g., 👕, 🎧, ⌚">
            <label>Description</label>
            <textarea id="productDesc" rows="3" placeholder="Product description"></textarea>
            <button class="btn btn-success" onclick="saveProduct()">Save Product</button>
            <button class="btn btn-danger" id="deleteProductBtn" style="display:none;" onclick="deleteProduct()">Delete Product</button>
        </div>
    </div>

    <!-- Update Order Modal -->
    <div id="updateOrderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUpdateModal()">&times;</span>
            <h2>Update Order</h2>
            <div id="updateOrderInfo"></div>
            <label>Status</label>
            <select id="orderStatusSelect">
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
            </select>
            <label>Update Message</label>
            <textarea id="statusMessage" rows="2" placeholder="Update message..."></textarea>
            <button class="btn btn-primary" onclick="updateOrderStatus()">Update</button>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReceiptModal()">&times;</span>
            <h2>Receipt</h2>
            <div id="receiptContent"></div>
            <button class="btn btn-primary" onclick="downloadReceipt()">Download PDF</button>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        let products = [
            { id: 1, name: "Premium T-Shirt", price: 25.99, stock: 50, sales: 45, image: "👕", description: "High quality cotton t-shirt" },
            { id: 2, name: "Wireless Headphones", price: 49.99, stock: 30, sales: 38, image: "🎧", description: "Noise cancelling Bluetooth" },
            { id: 3, name: "Smart Watch", price: 89.99, stock: 20, sales: 25, image: "⌚", description: "Fitness tracker" },
            { id: 4, name: "Leather Backpack", price: 39.99, stock: 40, sales: 32, image: "🎒", description: "Water resistant" },
            { id: 5, name: "Polarized Sunglasses", price: 19.99, stock: 60, sales: 55, image: "🕶️", description: "UV protection" }
        ];

        let orders = [];
        let users = [];
        let cart = [];
        let currentUser = null;
        let isAdminLoggedIn = false;
        let currentUpdateOrder = null;
        let editingProductId = null;

        const ADMIN_IDS = ['568280939', '1656048796'];

        // ==================== INIT ====================
        function init() {
            loadData();
            renderProducts();
            updateCartDisplay();
            renderUserOrders();
            updateCartBadge();
            loadStoreSettings();
            checkUserSession();
        }

        function loadData() {
            const savedCart = localStorage.getItem('lazy_cart');
            const savedOrders = localStorage.getItem('lazy_orders');
            const savedUsers = localStorage.getItem('lazy_users');
            const savedProducts = localStorage.getItem('lazy_products');
            
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedOrders) orders = JSON.parse(savedOrders);
            if (savedUsers) users = JSON.parse(savedUsers);
            if (savedProducts) products = JSON.parse(savedProducts);
            
            if (orders.length === 0) {
                orders = [
                    { id: 1, order_number: "ORD" + Date.now() + "001", customer_name: "John Doe", customer_phone: "85512345678", total_amount: 25.99, payment_status: "paid", order_status: "delivered", created_at: new Date().toISOString(), items: [{name:"T-Shirt", qty:1, price:25.99}], updates: [{date: new Date(), message: "Delivered"}] }
                ];
            }
        }

        function saveData() {
            localStorage.setItem('lazy_cart', JSON.stringify(cart));
            localStorage.setItem('lazy_orders', JSON.stringify(orders));
            localStorage.setItem('lazy_users', JSON.stringify(users));
            localStorage.setItem('lazy_products', JSON.stringify(products));
        }

        // ==================== PRODUCT MANAGEMENT (ADMIN) ====================
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div style="font-size: 3rem;">${p.image}</div>
                    <h3>${p.name}</h3>
                    <div class="product-price">$${p.price}</div>
                    <div>⭐ ${p.sales || 0} sold</div>
                    <div>📦 ${p.stock === -1 ? 'Unlimited' : p.stock + ' left'}</div>
                    <button class="btn btn-primary" onclick="addToCart(${p.id})">🛒 Add to Cart</button>
                    <button class="btn btn-success" onclick="buyNow(${p.id})">💳 Buy Now</button>
                    ${isAdminLoggedIn ? `
                        <div class="admin-product-controls">
                            <button class="btn btn-warning" onclick="openEditProduct(${p.id})">✏️ Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            
            if (isAdminLoggedIn) {
                renderAdminProducts();
            }
        }

        function renderAdminProducts() {
            const grid = document.getElementById('adminProductsGrid');
            if (!grid) return;
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div style="font-size: 2rem;">${p.image}</div>
                    <h3>${p.name}</h3>
                    <div class="product-price">$${p.price}</div>
                    <div>📦 Stock: ${p.stock === -1 ? 'Unlimited' : p.stock}</div>
                    <div>📈 Sold: ${p.sales || 0}</div>
                    <div class="admin-product-controls">
                        <button class="btn btn-warning" onclick="openEditProduct(${p.id})">✏️ Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddProductModal() {
            editingProductId = null;
            document.getElementById('productModalTitle').innerHTML = '➕ Add New Product';
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productImage').value = '🛍️';
            document.getElementById('productDesc').value = '';
            document.getElementById('deleteProductBtn').style.display = 'none';
            document.getElementById('productModal').style.display = 'flex';
        }

        function openEditProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            editingProductId = productId;
            document.getElementById('productModalTitle').innerHTML = '✏️ Edit Product';
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productImage').value = product.image;
            document.getElementById('productDesc').value = product.description || '';
            document.getElementById('deleteProductBtn').style.display = 'inline-block';
            document.getElementById('productModal').style.display = 'flex';
        }

        function saveProduct() {
            const id = parseInt(document.getElementById('productId').value);
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const stock = parseInt(document.getElementById('productStock').value);
            const image = document.getElementById('productImage').value.trim() || '🛍️';
            const description = document.getElementById('productDesc').value.trim();
            
            if (!name || isNaN(price)) {
                showNotification('Please fill all fields!', 'error');
                return;
            }
            
            if (id) {
                // Edit existing product
                const index = products.findIndex(p => p.id === id);
                if (index !== -1) {
                    products[index] = { ...products[index], name, price, stock, image, description };
                    showNotification('Product updated!', 'success');
                }
            } else {
                // Add new product
                const newId = Math.max(...products.map(p => p.id), 0) + 1;
                products.push({
                    id: newId,
                    name: name,
                    price: price,
                    stock: stock === -1 ? -1 : (stock || 0),
                    sales: 0,
                    image: image,
                    description: description
                });
                showNotification('Product added!', 'success');
            }
            
            saveData();
            renderProducts();
            closeProductModal();
        }

        function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                products = products.filter(p => p.id !== productId);
                saveData();
                renderProducts();
                showNotification('Product deleted!', 'success');
                closeProductModal();
            }
        }

        function closeProductModal() {
            document.getElementById('productModal').style.display = 'none';
            editingProductId = null;
        }

        // ==================== CART FUNCTIONS ====================
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || (product.stock !== -1 && product.stock <= 0)) {
                showNotification('Out of stock!', 'error');
                return;
            }
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });
            saveData();
            updateCartDisplay();
            updateCartBadge();
            showNotification(`✅ ${product.name} added!`, 'success');
        }

        function buyNow(productId) {
            addToCart(productId);
            switchTab('cart');
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            if (!cart.length) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">Cart is empty</p>';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }
            container.innerHTML = cart.map(item => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <div><strong>${item.name}</strong><br>$${item.price} x ${item.quantity}</div>
                    <div><strong>$${(item.price * item.quantity).toFixed(2)}</strong><br>
                        <button class="btn btn-warning" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                        <button class="btn btn-warning" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        <button class="btn btn-danger" onclick="removeFromCart(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('cartTotal').innerHTML = `<strong>Total: $${total.toFixed(2)}</strong>`;
        }

        function updateQuantity(id, qty) {
            if (qty <= 0) { removeFromCart(id); return; }
            const item = cart.find(i => i.id === id);
            if (item) item.quantity = qty;
            saveData();
            updateCartDisplay();
            updateCartBadge();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveData();
            updateCartDisplay();
            updateCartBadge();
        }

        function updateCartBadge() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').innerHTML = count;
        }

        function checkout() {
            if (!currentUser) {
                showNotification('Please login first!', 'warning');
                openLoginModal();
                return;
            }
            if (cart.length === 0) {
                showNotification('Cart is empty!', 'error');
                return;
            }
            
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const orderNumber = `ORD${Date.now()}${Math.floor(Math.random() * 1000)}`;
            const newOrder = {
                id: orders.length + 1,
                order_number: orderNumber,
                customer_name: currentUser.name || "Customer",
                customer_phone: currentUser.phone,
                total_amount: total,
                payment_status: "pending",
                order_status: "pending",
                created_at: new Date().toISOString(),
                items: [...cart],
                updates: [{ date: new Date().toISOString(), message: "Order placed" }]
            };
            
            orders.unshift(newOrder);
            cart = [];
            saveData();
            updateCartDisplay();
            updateCartBadge();
            renderUserOrders();
            
            showNotification(`Order placed! #${orderNumber}`, 'success');
            showPaymentInstructions(orderNumber, total);
        }

        function showPaymentInstructions(orderNumber, amount) {
            const html = `
                <div style="text-align: center;">
                    <h3>💳 Payment</h3>
                    <p>Order: ${orderNumber}</p>
                    <p>Amount: <strong>$${amount.toFixed(2)}</strong></p>
                    <div style="background: #2d2d44; padding: 15px; border-radius: 10px; margin: 15px 0;">
                        <p>🏦 ABA Bank</p>
                        <p>Account: 001059172</p>
                        <p>Name: Ban Lyheang</p>
                    </div>
                    <button class="btn btn-success" onclick="markPaid('${orderNumber}')">I Have Paid</button>
                </div>
            `;
            document.getElementById('receiptContent').innerHTML = html;
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function markPaid(orderNumber) {
            const order = orders.find(o => o.order_number === orderNumber);
            if (order) {
                order.payment_status = "paid";
                order.order_status = "processing";
                order.updates.unshift({ date: new Date().toISOString(), message: "Payment confirmed" });
                saveData();
                renderUserOrders();
                showNotification('Payment confirmed!', 'success');
            }
            closeReceiptModal();
        }

        // ==================== USER FUNCTIONS ====================
        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

        function loginUser() {
            const phone = document.getElementById('loginPhone').value.trim();
            const name = document.getElementById('loginName').value.trim();
            if (!phone) { showNotification('Enter phone number!', 'error'); return; }
            
            let user = users.find(u => u.phone === phone);
            if (!user) {
                user = { phone: phone, name: name || "Customer", joined: new Date().toISOString() };
                users.push(user);
                saveData();
            }
            
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            document.getElementById('userPhoneDisplay').innerHTML = `📞 ${phone}`;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            closeLoginModal();
            renderUserOrders();
            showNotification(`Welcome ${user.name}!`, 'success');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('userPhoneDisplay').innerHTML = 'Not logged in';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            showNotification('Logged out', 'success');
            renderUserOrders();
        }

        function checkUserSession() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('userPhoneDisplay').innerHTML = `📞 ${currentUser.phone}`;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-block';
            }
        }

        function renderUserOrders() {
            if (!currentUser) {
                document.getElementById('userOrdersList').innerHTML = '<p style="text-align:center; padding:40px;">Login to view orders</p>';
                return;
            }
            const userOrders = orders.filter(o => o.customer_phone === currentUser.phone);
            if (!userOrders.length) {
                document.getElementById('userOrdersList').innerHTML = '<p style="text-align:center; padding:40px;">No orders yet</p>';
                return;
            }
            document.getElementById('userOrdersList').innerHTML = userOrders.map(o => `
                <div style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
                        <div><strong>${o.order_number}</strong><br>$${o.total_amount.toFixed(2)}<br>${new Date(o.created_at).toLocaleDateString()}</div>
                        <div><span style="color: ${o.payment_status === 'paid' ? '#4CAF50' : '#FF9800'}">${o.order_status.toUpperCase()}</span><br>
                            <button class="btn btn-info" onclick="viewReceipt('${o.order_number}')">Receipt</button>
                            <button class="btn btn-success" onclick="trackSpecificOrder('${o.order_number}')">Track</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ==================== TRACKING ====================
        function trackOrderByPhone() {
            const orderNumber = document.getElementById('trackOrderNumber').value.trim();
            const phone = document.getElementById('trackPhoneNumber').value.trim();
            const order = orders.find(o => o.order_number === orderNumber && o.customer_phone === phone);
            const resultDiv = document.getElementById('trackResult');
            
            if (!order) {
                resultDiv.innerHTML = '<div class="card" style="color:#f44336;">Order not found!</div>';
                return;
            }
            
            const statuses = ['pending', 'processing', 'shipped', 'delivered'];
            const currentIndex = statuses.indexOf(order.order_status);
            
            resultDiv.innerHTML = `
                <div class="card">
                    <h3>${order.order_number}</h3>
                    <p>Customer: ${order.customer_name}</p>
                    <p>Amount: $${order.total_amount.toFixed(2)}</p>
                    <div style="display: flex; justify-content: space-between; margin: 15px 0;">
                        ${statuses.map((s, i) => `<div style="text-align:center; opacity:${i <= currentIndex ? 1 : 0.5}">${i <= currentIndex ? '✅' : '⏳'}<br>${s}</div>`).join('')}
                    </div>
                    <div><strong>Updates:</strong><br>${order.updates ? order.updates.slice(0,3).map(u => `📅 ${new Date(u.date).toLocaleString()}: ${u.message}`).join('<br>') : 'No updates'}</div>
                    <button class="btn btn-info" onclick="viewReceipt('${order.order_number}')" style="margin-top: 10px;">Get Receipt</button>
                </div>
            `;
        }

        function trackSpecificOrder(orderNumber) {
            const order = orders.find(o => o.order_number === orderNumber);
            if (order) {
                switchTab('track');
                document.getElementById('trackOrderNumber').value = orderNumber;
                document.getElementById('trackPhoneNumber').value = order.customer_phone;
                trackOrderByPhone();
            }
        }

        function viewReceipt(orderNumber) {
            const order = orders.find(o => o.order_number === orderNumber);
            if (!order) return;
            const storeName = localStorage.getItem('store_name') || 'L@ZY SHOP';
            const html = `
                <div style="text-align:center;">
                    <div style="font-size:3rem;">${document.getElementById('storeLogo').innerHTML}</div>
                    <h2>${storeName}</h2>
                    <p>Official Receipt</p>
                    <hr>
                    <p><strong>Order:</strong> ${order.order_number}</p>
                    <p><strong>Date:</strong> ${new Date(order.created_at).toLocaleString()}</p>
                    <p><strong>Customer:</strong> ${order.customer_name}</p>
                    <p><strong>Phone:</strong> ${order.customer_phone}</p>
                    <hr>
                    ${order.items.map(i => `<p>${i.name} x${i.quantity} = $${(i.price * i.quantity).toFixed(2)}</p>`).join('')}
                    <hr>
                    <h3>Total: $${order.total_amount.toFixed(2)}</h3>
                    <p>Status: ${order.payment_status === 'paid' ? '✅ PAID' : '⏳ PENDING'}</p>
                    <hr>
                    <p>Thank you!</p>
                </div>
            `;
            document.getElementById('receiptContent').innerHTML = html;
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function downloadReceipt() {
            const html = document.getElementById('receiptContent').innerHTML;
            const w = window.open('', '_blank');
            w.document.write(`<html><head><title>Receipt</title><style>body{font-family:Arial;padding:40px;}</style></head><body>${html}<script>window.print();<\/script></body></html>`);
            w.document.close();
        }

        function closeReceiptModal() { document.getElementById('receiptModal').style.display = 'none'; }

        // ==================== ADMIN FUNCTIONS ====================
        function adminLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if (ADMIN_IDS.includes(pwd)) {
                isAdminLoggedIn = true;
                document.getElementById('adminLoginCard').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminTabBtn').style.display = 'inline-block';
                document.getElementById('adminTotalProducts').innerHTML = products.length;
                renderAdminProducts();
                renderAdminStats();
                showNotification('Admin logged in!', 'success');
            } else {
                document.getElementById('adminError').innerHTML = 'Invalid Admin ID!';
            }
        }

        function renderAdminStats() {
            const total = orders.length;
            const revenue = orders.filter(o => o.payment_status === 'paid').reduce((s, o) => s + o.total_amount, 0);
            const uniqueUsers = [...new Set(orders.map(o => o.customer_phone))];
            document.getElementById('adminTotalOrders').innerHTML = total;
            document.getElementById('adminTotalRevenue').innerHTML = `$${revenue.toFixed(2)}`;
            document.getElementById('adminTotalUsers').innerHTML = uniqueUsers.length;
            filterAdminOrders();
        }

        function showAdminSection(section) {
            document.getElementById('adminProductsSection').style.display = section === 'products' ? 'block' : 'none';
            document.getElementById('adminOrdersSection').style.display = section === 'orders' ? 'block' : 'none';
            document.getElementById('adminSettingsSection').style.display = section === 'settings' ? 'block' : 'none';
            document.getElementById('adminLogoSection').style.display = section === 'logo' ? 'block' : 'none';
            if (section === 'products') renderAdminProducts();
            if (section === 'orders') filterAdminOrders();
        }

        function filterAdminOrders() {
            const search = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = orders.filter(o => o.order_number.toLowerCase().includes(search) || o.customer_name.toLowerCase().includes(search));
            document.getElementById('adminOrdersBody').innerHTML = filtered.map(o => `
                <tr>
                    <td>${o.order_number}</td><td>${o.customer_name}</td><td>${o.customer_phone}</td>
                    <td>$${o.total_amount.toFixed(2)}</td><td>${o.order_status}</td>
                    <td><button class="btn btn-primary" onclick="openUpdateOrder(${o.id})">Update</button>
                    <button class="btn btn-info" onclick="viewReceipt('${o.order_number}')">Receipt</button></td>
                </tr>
            `).join('');
        }

        function openUpdateOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                currentUpdateOrder = order;
                document.getElementById('updateOrderInfo').innerHTML = `<p><strong>${order.order_number}</strong><br>${order.customer_name}<br>$${order.total_amount.toFixed(2)}</p>`;
                document.getElementById('orderStatusSelect').value = order.order_status;
                document.getElementById('updateOrderModal').style.display = 'flex';
            }
        }

        function updateOrderStatus() {
            if (currentUpdateOrder) {
                currentUpdateOrder.order_status = document.getElementById('orderStatusSelect').value;
                const msg = document.getElementById('statusMessage').value || `Status updated to ${currentUpdateOrder.order_status}`;
                if (!currentUpdateOrder.updates) currentUpdateOrder.updates = [];
                currentUpdateOrder.updates.unshift({ date: new Date().toISOString(), message: msg });
                saveData();
                renderAdminStats();
                renderUserOrders();
                closeUpdateModal();
                showNotification('Order updated!', 'success');
            }
        }

        function closeUpdateModal() { document.getElementById('updateOrderModal').style.display = 'none'; }

        // ==================== SETTINGS ====================
        function loadStoreSettings() {
            document.getElementById('storeNameInput').value = localStorage.getItem('store_name') || 'L@ZY SHOP';
            document.getElementById('storeSloganInput').value = localStorage.getItem('store_slogan') || 'Quality Products | Fast Delivery';
            document.getElementById('storePhoneInput').value = localStorage.getItem('store_phone') || '0969903084';
            document.getElementById('storeEmailInput').value = localStorage.getItem('store_email') || 'lazy@shop.com';
            document.getElementById('storeName').innerHTML = localStorage.getItem('store_name') || 'L@ZY SHOP';
            document.getElementById('storeSlogan').innerHTML = localStorage.getItem('store_slogan') || 'Quality Products | Fast Delivery';
        }

        function saveStoreSettings() {
            localStorage.setItem('store_name', document.getElementById('storeNameInput').value);
            localStorage.setItem('store_slogan', document.getElementById('storeSloganInput').value);
            localStorage.setItem('store_phone', document.getElementById('storePhoneInput').value);
            localStorage.setItem('store_email', document.getElementById('storeEmailInput').value);
            document.getElementById('storeName').innerHTML = localStorage.getItem('store_name');
            document.getElementById('storeSlogan').innerHTML = localStorage.getItem('store_slogan');
            showNotification('Settings saved!', 'success');
        }

        function previewLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('logoPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveLogo() {
            const url = document.getElementById('logoUrl').value;
            const preview = document.getElementById('logoPreview').src;
            const finalLogo = url || preview;
            if (finalLogo && !finalLogo.includes('blob:')) {
                localStorage.setItem('store_logo', finalLogo);
                document.getElementById('storeLogo').innerHTML = `<img src="${finalLogo}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                showNotification('Logo saved!', 'success');
            }
        }

        function resetLogo() {
            localStorage.removeItem('store_logo');
            document.getElementById('storeLogo').innerHTML = '🛍️';
            document.getElementById('logoPreview').src = '';
            showNotification('Logo reset!', 'success');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tabName}-tab`).classList.add('active');
            if (event.target) event.target.classList.add('active');
            if (tabName === 'orders') renderUserOrders();
            if (tabName === 'admin' && isAdminLoggedIn) renderAdminStats();
        }

        function showNotification(msg, type = 'success') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.innerHTML = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
